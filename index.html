<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container { display:flex; justify-content:center; gap:30px; margin-top:20px; }

.hex-block { width:220px; }

.row { display:flex; align-items:center; justify-content:center; margin:6px 0; }

.marker { width:25px; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin { background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%); }

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:11px;
  cursor:pointer;
}
.tag.active { background:#333;color:white; }

.trigram-box { display:flex; flex-direction:column; justify-content:center; height:320px; }
.trigram { font-size:22px; font-weight:bold; }

.section { max-width:1000px; margin:20px auto; text-align:left; }

.category-header {
  font-weight:bold;
  background:#eee;
  padding:5px;
  cursor:pointer;
}

.hidden { display:none; }

.formula-row { display:flex; padding:6px; cursor:pointer; }
.formula-name { width:50%; }
.formula-tags { width:50%; }

.popup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
  text-align:left;
}

.dropdown {
  position:relative;
  display:inline-block;
  margin:4px;
}

.dropdown-content {
  display:none;
  position:absolute;
  background:#fff;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  padding:8px;
  z-index:10;
}

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetFilters()">Reset Filters</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" name="hex" checked onclick="selectHex('orig')">
</div>

<div class="trigram-box">
<div id="top-trigram" class="trigram"></div>
<div id="top-tags"></div>
<br>
<div id="bottom-trigram" class="trigram"></div>
<div id="bottom-tags"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio" name="hex" onclick="selectHex('nuc')">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio" name="hex" onclick="selectHex('out')">
</div>

</div>

<div class="section">
<h3 onclick="toggleInfo()">Hexagram Info ▼</h3>
<div id="hex-info"></div>
</div>

<div class="section">
<h3>Meridian Filter</h3>
<div id="meridian-filter"></div>

<h3>Symptom Filters</h3>
<div id="symptom-filters"></div>
</div>

<div class="section">
<h3>Formulas</h3>
<div id="formula-list"></div>
</div>

<div id="popup" class="popup hidden"></div>

<script>

/* ===== ADD THIS NEW CODE ===== */

const symptomNames = ["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const symptomCols = [17,18,19,20,21,22,23];

function buildSymptomFilters(){
let c=document.getElementById("symptom-filters");
c.innerHTML="";

symptomNames.forEach((name,i)=>{

let wrap=document.createElement("div");
wrap.className="dropdown";

let btn=document.createElement("button");
btn.innerText=name;

let panel=document.createElement("div");
panel.className="dropdown-content";

btn.onclick=(e)=>{
e.stopPropagation();
panel.style.display = panel.style.display==="block" ? "none":"block";
};

let set=new Set();

formulaData.forEach(f=>{
let val=f.raw[symptomCols[i]]?.v;
if(val){
val.split(",").forEach(v=>set.add(v.trim()));
}
});

[...set].sort().forEach(s=>{

let label=document.createElement("label");

let cb=document.createElement("input");
cb.type="checkbox";

cb.onchange=()=>{
if(!symptomFilters[name]) symptomFilters[name]=[];

if(cb.checked){
symptomFilters[name].push(s);
}else{
symptomFilters[name]=symptomFilters[name].filter(x=>x!==s);
}

renderFormulas();
};

label.append(cb," "+s);
panel.appendChild(label);
panel.appendChild(document.createElement("br"));

});

wrap.append(btn,panel);
c.appendChild(wrap);

});

/* CLICK OUTSIDE CLOSE */
document.addEventListener("click",()=>{
document.querySelectorAll(".dropdown-content").forEach(p=>p.style.display="none");
});

}

/* MODIFY RESET */
function resetFilters(){
activeMeridians=[...MERIDIANS];
symptomFilters={};
renderMeridianFilter();
buildSymptomFilters();
renderFormulas();
}

/* MODIFY FORMULA LIST (collapsed by default) */
function renderFormulas(){
let c=document.getElementById("formula-list");
c.innerHTML="";

let grouped={};

formulaData.forEach(f=>{

if(!f.meridians.split(",").some(m=>activeMeridians.includes(m.trim()))) return;

for(let i=0;i<7;i++){
let selected=symptomFilters[symptomNames[i]];
if(selected?.length){
let val=f.raw[symptomCols[i]]?.v||"";
if(!selected.some(s=>val.includes(s))) return;
}
}

if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

Object.keys(grouped).forEach(cat=>{

let head=document.createElement("div");
head.className="category-header";
head.innerText=`${cat} (${grouped[cat].length})`;

let box=document.createElement("div");
box.classList.add("hidden"); // 🔥 collapsed by default

head.onclick=()=>box.classList.toggle("hidden");

grouped[cat].forEach(f=>{

let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";
tags.innerText=f.meridians;

row.append(name,tags);
row.onclick=()=>showPopup(f);

box.appendChild(row);
});

c.append(head,box);
});
}

/* ===== ADD THIS CALL AFTER LOAD ===== */
/* after loadAll() finishes */
buildSymptomFilters();

</script>
</body>
</html>
