<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.hex-block { width:220px; }

.row {
  display:flex;
  align-items:center;
  justify-content:center;
  margin:6px 0;
}

.marker { width:25px; text-align:center; font-size:12px; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
}

.section {
  max-width:1000px;
  margin:20px auto;
  text-align:left;
}

.hidden { display:none; }

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
</div>

</div>

<!-- 🔥 HEXAGRAM INFO -->
<div class="section">
<h3 onclick="toggleInfo()" style="cursor:pointer;">Hexagram Information ▼</h3>
<div id="hex-info"></div>
</div>

<!-- FILTER -->
<div class="section">
<h3>Meridians</h3>
<div id="meridian-filter"></div>
</div>

<div class="section">
<h3>Formulas</h3>
<div id="formula-list"></div>
</div>

<script>

/* ================= STATE ================= */

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let subjectLine=3;
let objectLine=6;

/* ================= HEXAGRAM ================= */

function getOutcome(){
return lines.map((v,i)=>{
if(!moving[i]) return v;
return v ? 0 : 1;
});
}

function getNuclear(){
return [lines[1],lines[2],lines[3],lines[2],lines[3],lines[4]];
}

/* ================= DRAW ================= */

function drawOriginal(){
const c=document.getElementById("original");
c.innerHTML="";

for(let i=5;i>=0;i--){

let row=document.createElement("div");
row.className="row";

let left=document.createElement("div");
left.className="marker";

let circle=document.createElement("div");
circle.className="circle";

if(moving[i]) circle.innerText=lines[i]?"O":"X";

circle.onclick=()=>{
moving[i]=!moving[i];
update();
};

left.appendChild(circle);

let line=document.createElement("div");
line.className="line "+(lines[i]?"yang":"yin");

line.onclick=()=>{
lines[i]=lines[i]?0:1;
update();
};

let right=document.createElement("div");
right.className="marker";

/* 🔥 SUBJECT / OBJECT */
if(i+1===subjectLine) right.innerText="S";
if(i+1===objectLine) right.innerText="O";

row.append(left,line,right);
c.appendChild(row);
}
}

function drawStatic(id,arr){
const c=document.getElementById(id);
c.innerHTML="";
for(let i=5;i>=0;i--){
let row=document.createElement("div");
row.className="row";
let line=document.createElement("div");
line.className="line "+(arr[i]?"yang":"yin");
row.appendChild(line);
c.appendChild(row);
}
}

/* ================= TAGS ================= */

function renderTags(id,arr){
const c=document.getElementById(id);
c.innerHTML="";
arr.forEach(t=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=t;
c.appendChild(tag);
});
}

/* ================= UPDATE ================= */

function update(){

drawOriginal();

const nuclear=getNuclear();
const outcome=getOutcome();

drawStatic("nuclear",nuclear);
drawStatic("outcome",outcome);

/* 🔥 DEMO TAGS (replace with sheet later) */
renderTags("orig-tags",["LV","SP"]);
renderTags("nuc-tags",["HT"]);
renderTags("out-tags",["KD"]);

/* NOTES */
document.getElementById("orig-notes").innerText="Notes here";
document.getElementById("nuc-notes").innerText="Notes here";
document.getElementById("out-notes").innerText="Notes here";

/* INFO */
document.getElementById("hex-info").innerText="Hexagram details here";

}

/* ================= UI ================= */

function toggleInfo(){
document.getElementById("hex-info").classList.toggle("hidden");
}

function resetAll(){
lines=[1,1,1,1,1,1];
moving=[false,false,false,false,false,false];
update();
}

function randomHexagram(){
lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
moving=Array.from({length:6},()=>Math.random()>0.5);
update();
}

update();

</script>

</body>
</html>
