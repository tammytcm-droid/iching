<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

button { margin:10px; padding:6px 12px; cursor:pointer; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

/* HEXAGRAM */
.row { display:flex; justify-content:center; margin:6px 0; }
.line { width:110px; height:12px; margin:0 6px; }
.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

/* TAGS */
.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}
.tag.active { background:#333;color:white; }

/* FILTER BUTTONS */
.filter-btn {
  padding:6px 10px;
  margin:5px;
  border:1px solid #ccc;
  cursor:pointer;
}

.filter-panel {
  display:none;
  border:1px solid #ccc;
  padding:10px;
  width:250px;
  max-height:200px;
  overflow:auto;
  margin:5px auto;
  text-align:left;
  background:#fafafa;
}

/* FORMULAS */
.category-header {
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.formula-row {
  display:flex;
  padding:6px;
  cursor:pointer;
}

.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

/* POPUP */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
  text-align:left;
}
.hidden { display:none; }

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<!-- HEXAGRAM -->
<div class="container">
  <div>
    <h3>Original</h3>
    <div id="original"></div>
  </div>
  <div>
    <h3>Nuclear</h3>
    <div id="nuclear"></div>
  </div>
  <div>
    <h3>Outcome</h3>
    <div id="outcome"></div>
  </div>
</div>

<!-- FILTERS -->
<h3>Filters</h3>

<div id="filter-bar"></div>

<div id="line-buttons"></div>
<div id="line-panels"></div>

<button onclick="resetFilter()">Reset</button>

<h3>Formulas</h3>
<div id="formula-list"></div>

<div id="popup" class="popup hidden"></div>

<script>

const MERIDIANS=["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];

let activeMeridians=[...MERIDIANS];
let lineFilters={};

let formulaData=[];
let formulaHeaders=[];

const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

/* HEXAGRAM BASIC (visual only placeholder so nothing breaks) */
function drawHex(id){
const c=document.getElementById(id);
c.innerHTML="";
for(let i=0;i<6;i++){
let row=document.createElement("div");
row.className="row";
let line=document.createElement("div");
line.className="line yang";
row.appendChild(line);
c.appendChild(row);
}
}
drawHex("original");
drawHex("nuclear");
drawHex("outcome");

/* MERIDIAN FILTER */
function buildMeridianFilter(){
const bar=document.getElementById("filter-bar");
bar.innerHTML="";

MERIDIANS.forEach(m=>{
let tag=document.createElement("span");
tag.className="tag active";
tag.innerText=m;

tag.onclick=()=>{
tag.classList.toggle("active");

if(activeMeridians.includes(m)){
activeMeridians=activeMeridians.filter(x=>x!==m);
}else{
activeMeridians.push(m);
}

renderFormulas();
};

bar.appendChild(tag);
});
}

/* 🔥 BUTTON + PANEL FILTERS */
function buildLineFilters(){

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

const btnContainer=document.getElementById("line-buttons");
const panelContainer=document.getElementById("line-panels");

btnContainer.innerHTML="";
panelContainer.innerHTML="";

names.forEach((name,i)=>{

lineFilters[name]=[];

// BUTTON
let btn=document.createElement("button");
btn.className="filter-btn";
btn.innerText=name;

let panel=document.createElement("div");
panel.className="filter-panel";

btn.onclick=()=>{
panel.style.display = panel.style.display==="block" ? "none" : "block";
};

// VALUES
let values=new Set();
formulaData.forEach(f=>{
let v=f.raw[cols[i]]?.v;
if(v) values.add(v);
});

// CHECKBOXES
values.forEach(v=>{
let label=document.createElement("label");

let cb=document.createElement("input");
cb.type="checkbox";
cb.value=v;

cb.onchange=()=>{
if(cb.checked){
lineFilters[name].push(v);
}else{
lineFilters[name]=lineFilters[name].filter(x=>x!==v);
}
renderFormulas();
};

label.appendChild(cb);
label.append(" "+v);

panel.appendChild(label);
panel.appendChild(document.createElement("br"));
});

btnContainer.appendChild(btn);
panelContainer.appendChild(panel);

});
}

/* FORMULAS */
function renderFormulas(){

const container=document.getElementById("formula-list");
container.innerHTML="";

const grouped={};

formulaData.forEach(f=>{

// MERIDIANS
const mMatch=f.meridians.split(",")
.some(m=>activeMeridians.includes(m.trim()));

if(!mMatch) return;

// LINE FILTERS
const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

for(let i=0;i<names.length;i++){
let selected=lineFilters[names[i]];
if(selected.length){
let val=f.raw[cols[i]]?.v;
if(!selected.includes(val)) return;
}
}

// GROUP
if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

// RENDER
Object.keys(grouped).forEach(cat=>{

let list=grouped[cat];

let header=document.createElement("div");
header.className="category-header";
header.innerText=`${cat} (${list.length})`;

let content=document.createElement("div");

header.onclick=()=>content.classList.toggle("hidden");

list.forEach(f=>{

let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";

f.meridians.split(",").forEach(m=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=m.trim();
tags.appendChild(tag);
});

row.append(name,tags);
row.onclick=()=>showPopup(f);

content.appendChild(row);
});

container.appendChild(header);
container.appendChild(content);

});
}

/* POPUP */
function showPopup(f){
const popup=document.getElementById("popup");
popup.innerHTML="";
popup.classList.remove("hidden");

f.raw.slice(0,17).forEach((cell,i)=>{
if(cell && cell.v){
let row=document.createElement("div");
row.innerHTML=`<b>${formulaHeaders[i]}:</b> ${cell.v}`;
popup.appendChild(row);
}
});

let close=document.createElement("button");
close.innerText="Close";
close.onclick=()=>popup.classList.add("hidden");

popup.appendChild(close);
}

/* RESET */
function resetFilter(){
activeMeridians=[...MERIDIANS];
buildMeridianFilter();
buildLineFilters();
renderFormulas();
}

/* LOAD */
async function loadFormulas(){

const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`;
const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

const rows=json.table.rows;

formulaHeaders=rows[0].c.map(c=>c?.v||"");

formulaData=rows.slice(1).map(r=>({
raw:r.c,
name:r.c[0]?.v||"",
category:r.c[3]?.v||"",
meridians:r.c[4]?.v||""
}));

buildMeridianFilter();
buildLineFilters();
renderFormulas();
}

loadFormulas();

</script>

</body>
</html>
