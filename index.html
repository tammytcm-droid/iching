<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
  align-items:flex-start;
}

.hex-block { width:220px; }

.row {
  display:flex;
  align-items:center;
  justify-content:center;
  margin:6px 0;
}

.marker { width:25px; text-align:center; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}
.tag.active { background:#333;color:white; }

.trigram-box {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:320px;
}

.trigram {
  font-size:22px;
  font-weight:bold;
  margin:10px 0;
}

.filter-panel {
  display:none;
  border:1px solid #ccc;
  padding:8px;
  max-height:200px;
  overflow:auto;
  text-align:left;
  width:220px;
  margin:auto;
}

.section { max-width:1000px; margin:20px auto; text-align:left; }

.category-header {
  font-weight:bold;
  cursor:pointer;
  background:#f0f0f0;
  padding:6px;
  margin-top:6px;
}

.hidden { display:none; }

.formula-row {
  display:flex;
  padding:6px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}

.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

/* POPUP */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
  text-align:left;
  z-index:1000;
}

.popup.hidden { display:none; }

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" name="hex" checked onclick="selectHex('orig')">
</div>

<div class="trigram-box">
  <div id="top-trigram" class="trigram"></div>
  <div id="top-tags"></div>
  <div style="height:30px;"></div>
  <div id="bottom-trigram" class="trigram"></div>
  <div id="bottom-tags"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio" name="hex" onclick="selectHex('nuc')">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio" name="hex" onclick="selectHex('out')">
</div>

</div>

<div class="section">
<h3 onclick="toggleInfo()" style="cursor:pointer;">Hexagram Information ▼</h3>
<div id="hex-info"></div>
</div>

<div class="section">
<h3>Meridian Filter</h3>
<div id="meridian-filter"></div>
<button onclick="resetMeridians()">Reset Meridians</button>

<h3>Symptom Filters</h3>
<div id="symptom-buttons"></div>
<div id="symptom-panels"></div>
<button onclick="resetSymptoms()">Reset Symptoms</button>
</div>

<div class="section">
<h3>Formulas</h3>
<div id="formula-list"></div>
</div>

<div id="popup" class="popup hidden"></div>

<script>

let formulaHeaders=[];

/* ===== RESET FUNCTIONS ===== */

function resetMeridians(){
activeMeridians=[...MERIDIANS];
buildMeridianFilter();
renderFormulas();
}

function resetSymptoms(){
Object.keys(symptomFilters).forEach(k=>symptomFilters[k]=[]);
buildSymptomFilters();
renderFormulas();
}

/* ===== POPUP ===== */

function showPopup(f){

const popup=document.getElementById("popup");
popup.innerHTML="";
popup.classList.remove("hidden");

f.raw.slice(0,17).forEach((cell,i)=>{
if(cell && cell.v){
let row=document.createElement("div");
row.innerHTML=`<b>${formulaHeaders[i]}:</b> ${cell.v}`;
popup.appendChild(row);
}
});

let close=document.createElement("button");
close.innerText="Close";
close.onclick=()=>popup.classList.add("hidden");

popup.appendChild(close);
}

/* ===== FORMULAS (UPDATED) ===== */

function renderFormulas(){

const c=document.getElementById("formula-list");
c.innerHTML="";

const grouped={};

formulaData.forEach(f=>{

const mMatch=f.meridians.split(",")
.some(m=>activeMeridians.includes(m.trim()));
if(!mMatch) return;

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

for(let i=0;i<names.length;i++){
let selected=symptomFilters[names[i]];
if(selected.length){
let vals=parseSymptoms(f.raw[cols[i]]?.v);
if(!selected.some(v=>vals.includes(v))) return;
}
}

if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

Object.keys(grouped).forEach(cat=>{

let header=document.createElement("div");
header.className="category-header";
header.innerText=`${cat} (${grouped[cat].length})`;

let content=document.createElement("div");

header.onclick=()=>content.classList.toggle("hidden");

grouped[cat].forEach(f=>{

let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";

f.meridians.split(",").forEach(m=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=m.trim();
tags.appendChild(tag);
});

row.append(name,tags);

/* 🔥 POPUP CLICK */
row.onclick=()=>showPopup(f);

content.appendChild(row);
});

c.appendChild(header);
c.appendChild(content);
});
}

/* ===== LOAD FIX ===== */

async function loadAll(){

let res=await fetch(`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`);
let text=await res.text();
let json=JSON.parse(text.substring(47).slice(0,-2));

formulaHeaders=json.table.rows[0].c.map(c=>c?.v||"");

formulaData=json.table.rows.slice(1).map(r=>({
raw:r.c,
name:r.c[0]?.v||"",
category:r.c[3]?.v||"",
meridians:r.c[4]?.v||""
}));

buildSymptomFilters();
update();
}

</script>
