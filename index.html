<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.hex-block { width:220px; }

.row {
  display:flex;
  align-items:center;
  justify-content:center;
  margin:6px 0;
}

.marker { width:25px; text-align:center; font-size:12px; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}

.tag.active { background:#333;color:white; }

.filter-panel {
  display:none;
  border:1px solid #ccc;
  padding:8px;
  max-height:200px;
  overflow:auto;
  text-align:left;
  width:200px;
  margin:auto;
}

.section { max-width:1000px; margin:20px auto; text-align:left; }

.category-header { font-weight:bold; cursor:pointer; }

.hidden { display:none; }

.formula-row { display:flex; padding:6px; cursor:pointer; }
.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" name="hex" checked onclick="selectHex('orig')">
</div>

<div>
<div id="top-trigram"></div>
<div id="top-tags"></div>
<div style="height:40px;"></div>
<div id="bottom-trigram"></div>
<div id="bottom-tags"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio" name="hex" onclick="selectHex('nuc')">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio" name="hex" onclick="selectHex('out')">
</div>

</div>

<!-- 🔥 HEXAGRAM INFO -->
<div class="section">
<h3 onclick="toggleInfo()" style="cursor:pointer;">Hexagram Information ▼</h3>
<div id="hex-info"></div>
</div>

<!-- 🔍 FILTERS -->
<div class="section">
<h3>Meridian Filter</h3>
<div id="meridian-filter"></div>

<h3>Symptom Filters</h3>
<div id="symptom-buttons"></div>
<div id="symptom-panels"></div>
</div>

<!-- 📊 FORMULAS -->
<div class="section">
<h3>Formulas</h3>
<div id="formula-list"></div>
</div>

<script>

/* ================= STATE ================= */

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let currentHex="orig";

let hexData=[];
let formulaData=[];

const HEX_SHEET="1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";
const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

const MERIDIANS=["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];
let activeMeridians=[...MERIDIANS];
let symptomFilters={};

/* ================= HEXAGRAM LOGIC ================= */

function getBinary(arr){ return arr.join(""); }

function getOutcome(){
return lines.map((v,i)=> moving[i] ? (v?0:1) : v);
}

function getNuclear(){
return [lines[1],lines[2],lines[3],lines[2],lines[3],lines[4]];
}

function findHex(binary){
return hexData.find(h=>h.binary===binary);
}

/* ================= DRAW ================= */

function drawOriginal(hex){

const c=document.getElementById("original");
c.innerHTML="";

for(let i=5;i>=0;i--){

let row=document.createElement("div");
row.className="row";

let left=document.createElement("div");
left.className="marker";

let circle=document.createElement("div");
circle.className="circle";

if(moving[i]) circle.innerText=lines[i]?"O":"X";

circle.onclick=()=>{
moving[i]=!moving[i];
update();
};

left.appendChild(circle);

let line=document.createElement("div");
line.className="line "+(lines[i]?"yang":"yin");

line.onclick=()=>{
lines[i]=lines[i]?0:1;
update();
};

let right=document.createElement("div");
right.className="marker";

if(hex){
if(i+1===hex.subject) right.innerText="S";
if(i+1===hex.object) right.innerText="O";
}

row.append(left,line,right);
c.appendChild(row);
}
}

function drawStatic(id,arr){
const c=document.getElementById(id);
c.innerHTML="";
for(let i=5;i>=0;i--){
let row=document.createElement("div");
row.className="row";
let line=document.createElement("div");
line.className="line "+(arr[i]?"yang":"yin");
row.appendChild(line);
c.appendChild(row);
}
}

/* ================= UPDATE ================= */

function update(){

const orig=findHex(getBinary(lines));
const nuc=findHex(getBinary(getNuclear()));
const out=findHex(getBinary(getOutcome()));

drawOriginal(orig);
drawStatic("nuclear",getNuclear());
drawStatic("outcome",getOutcome());

renderHexData("orig",orig);
renderHexData("nuc",nuc);
renderHexData("out",out);

renderInfo();
renderFormulas();
}

/* ================= RENDER ================= */

function renderHexData(prefix,hex){
if(!hex) return;

document.getElementById(prefix+"-title").innerText=
`${hex.number} ${hex.chinese} ${hex.name}\n${hex.english}`;

renderTags(prefix+"-tags",hex.meridians);
document.getElementById(prefix+"-notes").innerText=hex.notes;
}

function renderTags(id,str){
const c=document.getElementById(id);
c.innerHTML="";
if(!str) return;

str.split(",").forEach(t=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=t.trim();
c.appendChild(tag);
});
}

function renderInfo(){
const hex=currentHex==="orig"
? findHex(getBinary(lines))
: currentHex==="nuc"
? findHex(getBinary(getNuclear()))
: findHex(getBinary(getOutcome()));

if(!hex) return;

document.getElementById("hex-info").innerText=
`${hex.infoS}\n${hex.infoT}\n${hex.infoU}\n${hex.infoV}\n${hex.infoW}`;
}

/* ================= UI ================= */

function selectHex(type){
currentHex=type;
renderInfo();
}

function toggleInfo(){
document.getElementById("hex-info").classList.toggle("hidden");
}

function resetAll(){
lines=[1,1,1,1,1,1];
moving=[false,false,false,false,false,false];
update();
}

function randomHexagram(){
lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
moving=Array.from({length:6},()=>Math.random()>0.5);
update();
}

/* ================= LOAD ================= */

async function loadHex(){

const url=`https://docs.google.com/spreadsheets/d/${HEX_SHEET}/gviz/tq?tqx=out:json`;
const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

hexData=json.table.rows.map(r=>({
number:r.c[0]?.v,
binary:String(r.c[1]?.v).padStart(6,"0"),
name:r.c[2]?.v,
subject:r.c[3]?.v,
object:r.c[4]?.v,
english:r.c[5]?.v,
chinese:r.c[6]?.v,
meridians:r.c[7]?.v,
notes:r.c[17]?.v,
infoS:r.c[18]?.v,
infoT:r.c[19]?.v,
infoU:r.c[20]?.v,
infoV:r.c[21]?.v,
infoW:r.c[22]?.v
}));

update();
}

loadHex();

</script>

</body>
</html>
