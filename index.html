<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body { font-family: Arial; text-align: center; }

    h2 { margin-top: 10px; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .section {
      margin-top: 20px;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 6px;
    }

    .marker {
      width: 30px;
      text-align: center;
      font-weight: bold;
    }

    .circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      margin: auto;
    }

    .line {
      width: 120px;
      height: 14px;
      margin: 0 10px;
      cursor: pointer;
    }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    .title {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>

<div class="section">
  <div class="title">Original Hexagram</div>
  <div id="original"></div>
</div>

<div class="section">
  <div class="title">Nuclear Hexagram</div>
  <div id="nuclear"></div>
</div>

<script>

let lines = [1,1,1,1,1,1];
let moving = [false,false,false,false,false,false];

let subjectLine = null;
let objectLine = null;

const SHEET_ID = "1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";

let hexagramData = [];

// ----------------------------
function getBinary(arr) {
  return arr.join("");
}

// ----------------------------
async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  const res = await fetch(url);
  const text = await res.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  hexagramData = rows.map(r => ({
    number: r.c[0].v,
    binary: String(r.c[1].v).padStart(6, "0"),
    name: r.c[2].v,
    subject: Number(r.c[3].v),
    object: Number(r.c[4].v)
  }));

  update();
}

// ----------------------------
function findHexagram(arr) {
  const binary = getBinary(arr);

  return hexagramData.find(h =>
    String(h.binary).padStart(6, "0") === binary
  );
}

// ----------------------------
function getNuclear(arr) {
  // Nuclear structure:
  // 2,3,4 and 3,4,5
  return [
    arr[1],
    arr[2],
    arr[3],
    arr[2],
    arr[3],
    arr[4]
  ];
}

// ----------------------------
function update() {
  const hex = findHexagram(lines);

  if (hex) {
    subjectLine = Number(hex.subject);
    objectLine = Number(hex.object);
  } else {
    subjectLine = null;
    objectLine = null;
  }

  drawOriginal();
  drawNuclear();
}

// ----------------------------
function drawLine(container, arr) {

  container.innerHTML = "";

  for (let i = 5; i >= 0; i--) {

    const val = arr[i];
    const lineNumber = i + 1;

    let row = document.createElement("div");
    row.className = "row";

    let left = document.createElement("div");
    left.className = "marker";

    let circle = document.createElement("div");
    circle.className = "circle";

    left.appendChild(circle);

    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    row.appendChild(left);
    row.appendChild(line);

    container.appendChild(row);
  }
}

// ----------------------------
function drawOriginal() {
  drawLine(document.getElementById("original"), lines);
}

// ----------------------------
function drawNuclear() {
  const nuclear = getNuclear(lines);
  drawLine(document.getElementById("nuclear"), nuclear);
}

// ----------------------------
function resetAll() {
  lines = [1,1,1,1,1,1];
  moving = [false,false,false,false,false,false];
  update();
}

// ----------------------------
function toggle(i) {
  lines[i] = lines[i] ? 0 : 1;
  update();
}

// ----------------------------
// INTERACTIVE ORIGINAL ONLY
// ----------------------------
function drawInteractiveOriginal() {
  const container = document.getElementById("original");
  container.innerHTML = "";

  for (let i = 5; i >= 0; i--) {

    const val = lines[i];

    let row = document.createElement("div");
    row.className = "row";

    let left = document.createElement("div");
    let circle = document.createElement("div");
    circle.className = "circle";

    if (moving[i]) {
      circle.innerText = val === 1 ? "O" : "X";
    }

    left.appendChild(circle);

    left.onclick = () => {
      moving[i] = !moving[i];
      drawInteractiveOriginal();
    };

    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    line.onclick = () => {
      toggle(i);
    };

    row.appendChild(left);
    row.appendChild(line);

    container.appendChild(row);
  }
}

// ----------------------------
function update() {
  const hex = findHexagram(lines);

  if (hex) {
    subjectLine = Number(hex.subject);
    objectLine = Number(hex.object);
  }

  drawInteractiveOriginal();
  drawNuclear();
}

// ----------------------------
drawInteractiveOriginal();
loadData();

</script>

</body>
</html>
