<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body { font-family: Arial; text-align: center; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      align-items: flex-start;
    }

    .hex-block { width: 200px; }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 24px;
      margin: 6px 0;
    }

    .marker {
      width: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    .line { width: 110px; height: 12px; margin: 0 6px; cursor: pointer; }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    .trigram { font-size: 34px; font-weight: bold; }

    .tag {
      display: inline-block;
      background: #eee;
      border-radius: 12px;
      padding: 4px 10px;
      margin: 3px;
      font-size: 11px;
    }

    .notes {
      font-size: 12px;
      margin-top: 6px;
      min-height: 20px;
    }

    .info-section {
      margin-top: 30px;
      border-top: 1px solid #ccc;
      padding-top: 15px;
      width: 700px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .hidden { display: none; }

  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

  <!-- ORIGINAL -->
  <div class="hex-block">
    <div id="orig-num"></div>
    <div id="original"></div>
    <div id="orig-tags"></div>
    <div id="orig-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('orig')">
  </div>

  <!-- TRIGRAMS -->
  <div>
    <div id="top-trigram" class="trigram"></div>
    <div id="top-tags"></div>

    <div style="height:40px;"></div>

    <div id="bottom-trigram" class="trigram"></div>
    <div id="bottom-tags"></div>
  </div>

  <!-- NUCLEAR -->
  <div class="hex-block">
    <div id="nuc-num"></div>
    <div id="nuclear"></div>
    <div id="nuc-tags"></div>
    <div id="nuc-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('nuc')">
  </div>

  <!-- OUTCOME -->
  <div class="hex-block">
    <div id="out-num"></div>
    <div id="outcome"></div>
    <div id="out-tags"></div>
    <div id="out-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('out')">
  </div>

</div>

<!-- INFO PANEL -->
<div class="info-section">

  <h3>Hexagram Info</h3>
  <div id="info"></div>

  <!-- ✅ NEW FORMULA SECTION -->
  <h3>Formulas</h3>
  <div id="formula-list"></div>

</div>

<script>

let lines = [1,1,1,1,1,1];
let moving = [false,false,false,false,false,false];

let currentHex = null;

const SHEET_ID = "1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";
const FORMULA_SHEET_ID = "1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

let data = [];
let formulaData = [];

function getBinary(a){ return a.join(""); }

async function loadData(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0,-2));

  data = json.table.rows.map(r => ({
    number:r.c[0].v,
    binary:String(r.c[1].v).padStart(6,"0"),
    pinyin:r.c[2].v,
    chinese:r.c[6]?.v||"",
    meridians:r.c[7]?.v||"",
    top:r.c[8]?.v||"",
    bottom:r.c[9]?.v||"",
    notes:r.c[17]?.v||"",
    info:[r.c[18]?.v,r.c[19]?.v,r.c[20]?.v,r.c[21]?.v,r.c[22]?.v]
  }));

  update();
}

async function loadFormulas(){
  const url = `https://docs.google.com/spreadsheets/d/${FORMULA_SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0,-2));

  formulaData = json.table.rows.map(r => ({
    name: r.c[0]?.v || "",
    meridians: r.c[4]?.v || ""
  }));

  renderFormulas();
}

function findHex(a){
  return data.find(h=>h.binary===getBinary(a));
}

function update(){

  const orig=findHex(lines);

  if(orig){
    currentHex = orig;

    document.getElementById("orig-num").innerText =
      `${orig.number} ${orig.chinese} ${orig.pinyin}`;

    document.getElementById("top-trigram").innerText = orig.top;
    document.getElementById("bottom-trigram").innerText = orig.bottom;

    document.getElementById("orig-notes").innerText = orig.notes;
  }

  drawHex("original",lines,true);
}

function drawHex(id,arr,interactive=false){

  const c=document.getElementById(id);
  c.innerHTML="";

  for(let i=5;i>=0;i--){
    let row=document.createElement("div");
    row.className="row";

    let left=document.createElement("div");
    left.className="marker";

    if(interactive){
      let circle=document.createElement("div");
      circle.className="circle";
      if(moving[i]) circle.innerText = arr[i] ? "O" : "X";
      left.appendChild(circle);
      left.onclick = () => { moving[i]=!moving[i]; update(); };
    }

    let line=document.createElement("div");
    line.className="line "+(arr[i]?"yang":"yin");

    if(interactive){
      line.onclick=()=>{ lines[i]=lines[i]?0:1; update(); };
    }

    let right=document.createElement("div");
    right.className="marker";

    row.append(left,line,right);
    c.appendChild(row);
  }
}

function selectHex(type){

  if(!currentHex) return;

  const info=document.getElementById("info");
  info.innerHTML="";

  currentHex.info.forEach(i=>{
    if(i){
      let div=document.createElement("div");
      div.innerText=i;
      info.appendChild(div);
    }
  });
}

function renderFormulas(){

  const container = document.getElementById("formula-list");
  container.innerHTML = "";

  formulaData.forEach(f => {
    const row = document.createElement("div");
    row.style.margin = "4px 0";
    row.innerText = `${f.name} — ${f.meridians}`;
    container.appendChild(row);
  });
}

function randomHexagram(){
  lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
  moving=Array.from({length:6},()=>Math.random()>0.5);
  update();
}

function resetAll(){
  lines=[1,1,1,1,1,1];
  moving=[false,false,false,false,false,false];
  update();
}

loadData();
loadFormulas();

</script>

</body>
</html>
