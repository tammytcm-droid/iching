<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.hex-block { width:200px; }

.row {
  display:flex;
  justify-content:center;
  margin:6px 0;
}

.line { width:110px; height:12px; margin:0 6px; cursor:pointer; }
.yang { background:black; }
.yin { background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%); }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}

.tag.active { background:#333;color:white; }

.formula-row {
  display:flex;
  padding:6px;
  cursor:pointer;
}

.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

.category-header {
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.hidden { display:none; }

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">
  <div class="hex-block">
    <h3>Original</h3>
    <div id="original"></div>
    <div id="orig-tags"></div>
  </div>

  <div class="hex-block">
    <h3>Nuclear</h3>
    <div id="nuclear"></div>
    <div id="nuc-tags"></div>
  </div>

  <div class="hex-block">
    <h3>Outcome</h3>
    <div id="outcome"></div>
    <div id="out-tags"></div>
  </div>
</div>

<h3>Formulas</h3>

<div id="filter-bar"></div>
<button onclick="resetFilter()">Reset Filter</button>

<div id="formula-list"></div>

<div id="popup" class="popup hidden"></div>

<script>

const ALL_MERIDIANS = ["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];

let activeFilter = [];
let formulaData = [];
let formulaHeaders = [];
let currentHex = {};

const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

function buildFilter(){

  const bar=document.getElementById("filter-bar");
  bar.innerHTML="";

  ALL_MERIDIANS.forEach(m=>{

    let tag=document.createElement("span");
    tag.className="tag";
    tag.innerText=m;

    if(activeFilter.includes(m)) tag.classList.add("active");

    tag.onclick=()=>{
      tag.classList.toggle("active");

      if(activeFilter.includes(m)){
        activeFilter=activeFilter.filter(x=>x!==m);
      } else {
        activeFilter.push(m);
      }

      renderFormulas();
    };

    bar.appendChild(tag);
  });
}

function resetFilter(){
  // reset to hexagram meridians
  activeFilter = [];

  ["orig","nuc","out"].forEach(type=>{
    const h=currentHex[type];
    if(h && h.topM){
      activeFilter = activeFilter.concat(h.topM.split(",").map(x=>x.trim()));
    }
  });

  activeFilter = [...new Set(activeFilter)];

  buildFilter();
  renderFormulas();
}

async function loadFormulas(){

  const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));

  const rows=json.table.rows;

  formulaHeaders = rows[0].c.map(c=>c?.v||"");

  formulaData = rows.slice(1).map(r=>({
    raw:r.c,
    name:r.c[0]?.v||"",
    category:r.c[3]?.v||"Other",
    meridians:r.c[4]?.v||""
  })).filter(f=>f.name);

  renderFormulas();
}

function renderFormulas(){

  const container=document.getElementById("formula-list");
  container.innerHTML="";

  const grouped={};

  formulaData.forEach(f=>{

    const match = f.meridians.split(",")
      .some(m=>activeFilter.includes(m.trim()));

    if(activeFilter.length && !match) return;

    if(!grouped[f.category]) grouped[f.category]=[];
    grouped[f.category].push(f);
  });

  Object.keys(grouped).forEach(cat=>{

    let header=document.createElement("div");
    header.className="category-header";
    header.innerText=cat;

    let list=document.createElement("div");

    header.onclick=()=>list.classList.toggle("hidden");

    grouped[cat].forEach(f=>{

      let row=document.createElement("div");
      row.className="formula-row";

      let name=document.createElement("div");
      name.className="formula-name";
      name.innerText=f.name;

      let tags=document.createElement("div");
      tags.className="formula-tags";

      f.meridians.split(",").forEach(m=>{
        let tag=document.createElement("span");
        tag.className="tag";
        tag.innerText=m.trim();
        tags.appendChild(tag);
      });

      row.append(name,tags);
      row.onclick=()=>showPopup(f);

      list.appendChild(row);
    });

    container.appendChild(header);
    container.appendChild(list);
  });
}

function showPopup(f){

  const popup=document.getElementById("popup");
  popup.innerHTML="";
  popup.classList.remove("hidden");

  f.raw.slice(0,17).forEach((cell,i)=>{
    if(cell && cell.v){
      let row=document.createElement("div");
      row.innerHTML=`<b>${formulaHeaders[i]}:</b> ${cell.v}`;
      popup.appendChild(row);
    }
  });

  let close=document.createElement("button");
  close.innerText="Close";
  close.onclick=()=>popup.classList.add("hidden");

  popup.appendChild(close);
}

function resetAll(){
  currentHex = {
    orig:{topM:"LU,SP"},
    nuc:{topM:"HT"},
    out:{topM:"ST"}
  };
  resetFilter();
}

function randomHexagram(){ resetAll(); }

loadFormulas();
resetAll();

</script>

</body>
</html>
