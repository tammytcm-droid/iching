<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body { font-family: Arial; text-align: center; }

    button { margin: 10px; padding: 6px 12px; cursor: pointer; }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      align-items: flex-start;
    }

    .hex-block { width: 200px; }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 24px;
      margin: 6px 0;
    }

    .marker {
      width: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    .line { width: 110px; height: 12px; margin: 0 6px; cursor: pointer; }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    /* 🔺 BIGGER TRIGRAMS */
    .trigram { font-size: 34px; font-weight: bold; }

    .tags { margin-top: 8px; }
    .tag {
      display: inline-block;
      background: #eee;
      border-radius: 12px;
      padding: 4px 10px;
      margin: 3px;
      font-size: 11px;
      cursor: pointer;
    }

    .tag.active {
      background: black;
      color: white;
    }

    .notes {
      font-size: 12px;
      margin-top: 6px;
      min-height: 20px;
    }

    .info-section {
      margin-top: 30px;
      border-top: 1px solid #ccc;
      padding-top: 15px;
      width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .collapse-btn {
      cursor: pointer;
      margin-bottom: 10px;
    }

    .hidden { display: none; }

  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

  <div class="hex-block">
    <div id="orig-num"></div>
    <div id="original"></div>
    <div id="orig-tags" class="tags"></div>
    <div id="orig-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('orig')">
  </div>

  <div>
    <div id="top-trigram" class="trigram"></div>
    <div id="top-tags" class="tags"></div>

    <div style="height:40px;"></div>

    <div id="bottom-trigram" class="trigram"></div>
    <div id="bottom-tags" class="tags"></div>
  </div>

  <div class="hex-block">
    <div id="nuc-num"></div>
    <div id="nuclear"></div>
    <div id="nuc-tags" class="tags"></div>
    <div id="nuc-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('nuc')">
  </div>

  <div class="hex-block">
    <div id="out-num"></div>
    <div id="outcome"></div>
    <div id="out-tags" class="tags"></div>
    <div id="out-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('out')">
  </div>

</div>

<!-- 📖 INFO PANEL -->
<div class="info-section">

  <div class="collapse-btn" onclick="toggleInfo()">
    ▶ Toggle Hexagram Info
  </div>

  <div id="info-content" class="hidden"></div>

</div>

<script>

let lines = [1,1,1,1,1,1];
let moving = [false,false,false,false,false,false];

let selectedTags = new Set();
let currentHex = null;

const SHEET_ID = "1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";

let data = [];

function getBinary(a){ return a.join(""); }

async function loadData(){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0,-2));

  data = json.table.rows.map(r => ({
    number:r.c[0].v,
    binary:String(r.c[1].v).padStart(6,"0"),
    pinyin:r.c[2].v,
    subject:r.c[3].v,
    object:r.c[4].v,
    english:r.c[5]?.v||"",
    chinese:r.c[6]?.v||"",
    meridians:r.c[7]?.v||"",
    top:r.c[8]?.v||"",
    bottom:r.c[9]?.v||"",
    topM:r.c[10]?.v||"",
    bottomM:r.c[11]?.v||"",
    notes:r.c[17]?.v||"",
    info:[r.c[18]?.v,r.c[19]?.v,r.c[20]?.v,r.c[21]?.v,r.c[22]?.v]
  }));

  update();
}

function findHex(a){
  return data.find(h=>h.binary===getBinary(a));
}

function renderTags(id,text){
  const c=document.getElementById(id);
  c.innerHTML="";
  if(!text)return;

  text.split(",").forEach(t=>{
    let tag=document.createElement("span");
    tag.className="tag";
    tag.innerText=t.trim();

    if(selectedTags.has(t.trim())) tag.classList.add("active");

    tag.onclick=()=>{
      if(selectedTags.has(t.trim())) selectedTags.delete(t.trim());
      else selectedTags.add(t.trim());
      update();
    };

    c.appendChild(tag);
  });
}

function update(){

  const orig=findHex(lines);
  const nuc=findHex([lines[1],lines[2],lines[3],lines[2],lines[3],lines[4]]);
  const out=findHex(lines.map((v,i)=>moving[i]?(v?0:1):v));

  currentHex={orig,nuc,out};

  if(orig){
    document.getElementById("top-trigram").innerText=orig.top;
    document.getElementById("bottom-trigram").innerText=orig.bottom;
    renderTags("top-tags",orig.topM);
    renderTags("bottom-tags",orig.bottomM);
  }

  renderHex("orig",orig,lines,true);
  renderHex("nuc",nuc,[lines[1],lines[2],lines[3],lines[2],lines[3],lines[4]]);
  renderHex("out",out,lines.map((v,i)=>moving[i]?(v?0:1):v));
}

function renderHex(id,hex,arr,interactive=false){

  document.getElementById(id+"-num").innerText =
    hex ? `${hex.number} ${hex.chinese} ${hex.pinyin}` : "";

  renderTags(id+"-tags",hex?.meridians);
  document.getElementById(id+"-notes").innerText = hex?.notes || "";

  const c=document.getElementById(id==="orig"?"original":id==="nuc"?"nuclear":"outcome");
  c.innerHTML="";

  for(let i=5;i>=0;i--){
    let row=document.createElement("div");
    row.className="row";

    let left=document.createElement("div");
    left.className="marker";

    if(interactive){
      let circle=document.createElement("div");
      circle.className="circle";
      if(moving[i]) circle.innerText=arr[i]?"O":"X";
      left.appendChild(circle);
      left.onclick=()=>{moving[i]=!moving[i];update();}
    }

    let line=document.createElement("div");
    line.className="line "+(arr[i]?"yang":"yin");
    if(interactive) line.onclick=()=>{lines[i]=lines[i]?0:1;update();}

    let right=document.createElement("div");
    right.className="marker";

    row.append(left,line,right);
    c.appendChild(row);
  }
}

function selectHex(type){
  let hex=currentHex[type];
  if(!hex) return;

  let info=document.getElementById("info-content");
  info.innerHTML="";

  hex.info.forEach(i=>{
    if(i){
      let div=document.createElement("div");
      div.innerText=i;
      info.appendChild(div);
    }
  });
}

function toggleInfo(){
  document.getElementById("info-content").classList.toggle("hidden");
}

function randomHexagram(){
  lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
  moving=Array.from({length:6},()=>Math.random()>0.5);
  update();
}

function resetAll(){
  lines=[1,1,1,1,1,1];
  moving=[false,false,false,false,false,false];
  selectedTags.clear();
  update();
}

loadData();

</script>

</body>
</html>
