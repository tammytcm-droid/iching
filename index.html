<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.hex-block { width:220px; }

.row {
  display:flex;
  align-items:center;
  justify-content:center;
  margin:6px 0;
}

.marker { width:25px; text-align:center; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}
.tag.active { background:#333;color:white; }

.filter-panel {
  display:none;
  border:1px solid #ccc;
  padding:8px;
  max-height:200px;
  overflow:auto;
  text-align:left;
  width:200px;
  margin:auto;
}

.info { max-width:1000px; margin:20px auto; text-align:left; }

.category-header { font-weight:bold; cursor:pointer; }

.hidden { display:none; }

.formula-row { display:flex; padding:6px; cursor:pointer; }
.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" checked>
</div>

<div>
<div id="top-trigram"></div>
<div id="top-tags"></div>
<div style="height:40px;"></div>
<div id="bottom-trigram"></div>
<div id="bottom-tags"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio">
</div>

</div>

<h3>Meridian Filter</h3>
<div id="meridian-filter"></div>

<h3>Symptom Filters</h3>
<div id="symptom-buttons"></div>
<div id="symptom-panels"></div>

<h3>Hexagram Info</h3>
<div id="hex-info" class="info"></div>

<h3>Formulas</h3>
<div id="formula-list"></div>

<script>

const MERIDIANS=["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let activeMeridians=[...MERIDIANS];
let symptomFilters={};

let formulaData=[];

/* ================= HEXAGRAM ================= */

function drawOriginal(){
const c=document.getElementById("original");
c.innerHTML="";

for(let i=5;i>=0;i--){

let row=document.createElement("div");
row.className="row";

let left=document.createElement("div");
left.className="marker";

let circle=document.createElement("div");
circle.className="circle";

if(moving[i]) circle.innerText=lines[i]?"O":"X";

circle.onclick=()=>{
moving[i]=!moving[i];
update();
};

left.appendChild(circle);

let line=document.createElement("div");
line.className="line "+(lines[i]?"yang":"yin");

line.onclick=()=>{
lines[i]=lines[i]?0:1;
update();
};

let right=document.createElement("div");
right.className="marker";

row.append(left,line,right);
c.appendChild(row);
}
}

function drawStatic(id,arr){
const c=document.getElementById(id);
c.innerHTML="";
for(let i=5;i>=0;i--){
let row=document.createElement("div");
row.className="row";
let line=document.createElement("div");
line.className="line "+(arr[i]?"yang":"yin");
row.appendChild(line);
c.appendChild(row);
}
}

/* ================= FILTERS ================= */

function buildMeridianFilter(){
const c=document.getElementById("meridian-filter");
c.innerHTML="";

MERIDIANS.forEach(m=>{
let tag=document.createElement("span");
tag.className="tag active";
tag.innerText=m;

tag.onclick=()=>{
tag.classList.toggle("active");

if(activeMeridians.includes(m)){
activeMeridians=activeMeridians.filter(x=>x!==m);
}else{
activeMeridians.push(m);
}

renderFormulas();
};

c.appendChild(tag);
});
}

function parseSymptoms(val){
if(!val) return [];
return val.split(",").map(x=>x.trim());
}

function buildSymptomFilters(){

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

const btnC=document.getElementById("symptom-buttons");
const panelC=document.getElementById("symptom-panels");

btnC.innerHTML="";
panelC.innerHTML="";

names.forEach((name,i)=>{

symptomFilters[name]=[];

let btn=document.createElement("button");
btn.innerText=name;

let panel=document.createElement("div");
panel.className="filter-panel";

btn.onclick=()=>{
panel.style.display=panel.style.display==="block"?"none":"block";
};

let set=new Set();

formulaData.forEach(f=>{
parseSymptoms(f.raw[cols[i]]?.v).forEach(s=>set.add(s));
});

[...set].sort().forEach(s=>{

let label=document.createElement("label");

let cb=document.createElement("input");
cb.type="checkbox";

cb.onchange=()=>{
if(cb.checked){
symptomFilters[name].push(s);
}else{
symptomFilters[name]=symptomFilters[name].filter(x=>x!==s);
}

panel.style.display="none";
renderFormulas();
};

label.append(cb," "+s);
panel.appendChild(label);
panel.appendChild(document.createElement("br"));
});

btnC.appendChild(btn);
panelC.appendChild(panel);

});
}

/* ================= FORMULAS ================= */

function renderFormulas(){

const c=document.getElementById("formula-list");
c.innerHTML="";

const grouped={};

formulaData.forEach(f=>{

const mMatch=f.meridians.split(",")
.some(m=>activeMeridians.includes(m.trim()));

if(!mMatch) return;

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

for(let i=0;i<names.length;i++){
let selected=symptomFilters[names[i]];
if(selected.length){
let vals=parseSymptoms(f.raw[cols[i]]?.v);
if(!selected.some(v=>vals.includes(v))) return;
}
}

if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

Object.keys(grouped).forEach(cat=>{

let header=document.createElement("div");
header.className="category-header";
header.innerText=`${cat} (${grouped[cat].length})`;

let content=document.createElement("div");

header.onclick=()=>content.classList.toggle("hidden");

grouped[cat].forEach(f=>{

let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";

f.meridians.split(",").forEach(m=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=m.trim();
tags.appendChild(tag);
});

row.append(name,tags);
content.appendChild(row);
});

c.appendChild(header);
c.appendChild(content);

});
}

/* ================= CORE ================= */

function update(){
drawOriginal();
drawStatic("nuclear",lines);
drawStatic("outcome",lines);
renderFormulas();
}

function resetAll(){
lines=[1,1,1,1,1,1];
moving=[false,false,false,false,false,false];
update();
}

function randomHexagram(){
lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
moving=Array.from({length:6},()=>Math.random()>0.5);
update();
}

/* ================= LOAD ================= */

async function loadFormulas(){

const url="https://docs.google.com/spreadsheets/d/1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU/gviz/tq?tqx=out:json&gid=282292594";
const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

formulaData=json.table.rows.slice(1).map(r=>({
raw:r.c,
name:r.c[0]?.v||"",
category:r.c[3]?.v||"",
meridians:r.c[4]?.v||""
}));

buildMeridianFilter();
buildSymptomFilters();
update();
}

loadFormulas();

</script>

</body>
</html>
