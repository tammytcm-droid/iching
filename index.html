<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

button { margin:6px; padding:6px 10px; cursor:pointer; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
  align-items:flex-start;
}

.hex-block { width:220px; }

.row {
  display:flex;
  justify-content:center;
  align-items:center;
  margin:6px 0;
}

.marker { width:25px; text-align:center; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}

.tag.active { background:#333;color:white; }

.filter-panel {
  display:none;
  border:1px solid #ccc;
  padding:10px;
  width:220px;
  max-height:200px;
  overflow:auto;
  margin:5px auto;
  text-align:left;
}

.category-header {
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.hidden { display:none; }

.formula-row {
  display:flex;
  padding:6px;
  cursor:pointer;
}

.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
  text-align:left;
}

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" name="hex" checked onclick="selectHex('orig')">
</div>

<div>
<div id="top-trigram"></div>
<div id="bottom-trigram"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio" name="hex" onclick="selectHex('nuc')">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio" name="hex" onclick="selectHex('out')">
</div>

</div>

<h3>Filters</h3>
<div id="filter-bar"></div>
<div id="filter-buttons"></div>
<div id="filter-panels"></div>

<button onclick="resetFilter()">Reset Filter</button>

<h3>Formulas</h3>
<div id="formula-list"></div>

<div id="popup" class="popup hidden"></div>

<script>

const MERIDIANS=["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let activeMeridians=[...MERIDIANS];
let lineFilters={};

let formulaData=[];
let formulaHeaders=[];

const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

/* HEXAGRAM DRAW */

function drawHex(id,arr){
const c=document.getElementById(id);
c.innerHTML="";

for(let i=5;i>=0;i--){
let row=document.createElement("div");
row.className="row";

let left=document.createElement("div");
left.className="marker";

let circle=document.createElement("div");
circle.className="circle";

if(moving[i]) circle.innerText=arr[i]?"O":"X";

circle.onclick=()=>{
moving[i]=!moving[i];
update();
};

left.appendChild(circle);

let line=document.createElement("div");
line.className="line "+(arr[i]?"yang":"yin");

line.onclick=()=>{
lines[i]=lines[i]?0:1;
update();
};

let right=document.createElement("div");
right.className="marker";

row.append(left,line,right);
c.appendChild(row);
}
}

/* FILTER BUTTONS */

function buildFilters(){

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

const btnContainer=document.getElementById("filter-buttons");
const panelContainer=document.getElementById("filter-panels");

btnContainer.innerHTML="";
panelContainer.innerHTML="";

names.forEach((name,i)=>{

lineFilters[name]=[];

let btn=document.createElement("button");
btn.innerText=name;

let panel=document.createElement("div");
panel.className="filter-panel";

btn.onclick=()=>{
panel.style.display=panel.style.display==="block"?"none":"block";
};

let values=new Set();

formulaData.forEach(f=>{
let v=f.raw[cols[i]]?.v;
if(v) values.add(v);
});

[...values].sort().forEach(v=>{

let label=document.createElement("label");

let cb=document.createElement("input");
cb.type="checkbox";

cb.onchange=()=>{
if(cb.checked){
lineFilters[name].push(v);
}else{
lineFilters[name]=lineFilters[name].filter(x=>x!==v);
}

// 🔥 AUTO CLOSE AFTER CLICK
panel.style.display="none";

renderFormulas();
};

label.append(cb," "+v);
panel.appendChild(label);
panel.appendChild(document.createElement("br"));

});

btnContainer.appendChild(btn);
panelContainer.appendChild(panel);

});
}

/* FORMULAS */

function renderFormulas(){

const container=document.getElementById("formula-list");
container.innerHTML="";

const grouped={};

formulaData.forEach(f=>{

const mMatch=f.meridians.split(",")
.some(m=>activeMeridians.includes(m.trim()));

if(!mMatch) return;

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

for(let i=0;i<names.length;i++){
let selected=lineFilters[names[i]];
if(selected.length){
let val=f.raw[cols[i]]?.v;
if(!selected.includes(val)) return;
}
}

if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

Object.keys(grouped).forEach(cat=>{

let list=grouped[cat];

let header=document.createElement("div");
header.className="category-header";
header.innerText=`${cat} (${list.length})`;

let content=document.createElement("div");

header.onclick=()=>content.classList.toggle("hidden");

list.forEach(f=>{
let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";

f.meridians.split(",").forEach(m=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=m.trim();
tags.appendChild(tag);
});

row.append(name,tags);
row.onclick=()=>showPopup(f);

content.appendChild(row);
});

container.appendChild(header);
container.appendChild(content);

});
}

/* POPUP */

function showPopup(f){
const popup=document.getElementById("popup");
popup.innerHTML="";
popup.classList.remove("hidden");

f.raw.slice(0,17).forEach((cell,i)=>{
if(cell && cell.v){
let row=document.createElement("div");
row.innerHTML=`<b>${formulaHeaders[i]}:</b> ${cell.v}`;
popup.appendChild(row);
}
});

let close=document.createElement("button");
close.innerText="Close";
close.onclick=()=>popup.classList.add("hidden");

popup.appendChild(close);
}

/* RESET */

function resetFilter(){
activeMeridians=[...MERIDIANS];
buildFilters();
renderFormulas();
}

function resetAll(){
lines=[1,1,1,1,1,1];
moving=[false,false,false,false,false,false];
update();
}

/* RANDOM */

function randomHexagram(){
lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
moving=Array.from({length:6},()=>Math.random()>0.5);
update();
}

/* LOAD */

async function loadFormulas(){

const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`;
const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

const rows=json.table.rows;

formulaHeaders=rows[0].c.map(c=>c?.v||"");

formulaData=rows.slice(1).map(r=>({
raw:r.c,
name:r.c[0]?.v||"",
category:r.c[3]?.v||"",
meridians:r.c[4]?.v||""
}));

buildFilters();
renderFormulas();
update();
}

function update(){
drawHex("original",lines);
drawHex("nuclear",lines);
drawHex("outcome",lines);
}

loadFormulas();

</script>

</body>
</html>
