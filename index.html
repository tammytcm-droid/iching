<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    button {
      margin: 10px;
      padding: 6px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px;
    }

    .marker {
      width: 30px;
      text-align: center;
      cursor: pointer;
    }

    .circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      font-size: 12px;
      font-weight: bold;
    }

    .line {
      width: 120px;
      height: 14px;
      margin: 0 10px;
      cursor: pointer;
    }

    .yang {
      background: black;
    }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }
  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>

<div id="hexagram"></div>

<script>

// 1 = yang, 0 = yin
let lines = [1,1,1,1,1,1];

// moving lines
let moving = [false,false,false,false,false,false];

// TEMP subject/object
let subjectLine = 2;
let objectLine = 5;

function draw() {
  const container = document.getElementById("hexagram");
  container.innerHTML = "";

  lines.forEach((val, i) => {

    let row = document.createElement("div");
    row.className = "row";

    // LEFT circle
    let left = document.createElement("div");
    left.className = "marker";

    let circle = document.createElement("div");
    circle.className = "circle";

    if (moving[i]) {
      circle.innerText = val === 1 ? "O" : "X";
    }

    left.appendChild(circle);

    left.onclick = () => {
      moving[i] = !moving[i];
      draw();
    };

    // LINE (no longer resets moving)
    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    line.onclick = () => {
      lines[i] = lines[i] ? 0 : 1;
      draw();
    };

    // RIGHT marker
    let right = document.createElement("div");
    right.className = "marker";

    if (i + 1 === subjectLine) right.innerText = "S";
    if (i + 1 === objectLine) right.innerText = "O";

    row.appendChild(left);
    row.appendChild(line);
    row.appendChild(right);

    container.appendChild(row);
  });
}

// RESET FUNCTION
function resetAll() {
  lines = [1,1,1,1,1,1];
  moving = [false,false,false,false,false,false];
  draw();
}

draw();

</script>

</body>
</html>
