<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    h2 { margin-top: 10px; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      align-items: flex-start;
    }

    .hex-block {
      text-align: center;
      width: 200px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 12px;
    }

    .subtitle {
      margin-bottom: 6px;
    }

    /* 🔥 PERFECT ALIGNMENT */
    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 24px;
      margin: 6px 0;
    }

    .marker {
      width: 30px;
      text-align: center;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }

    .line {
      width: 110px;
      height: 12px;
      margin: 0 6px;
      cursor: pointer;
    }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    .tags {
      margin-top: 8px;
      min-height: 24px;
    }

    .tag {
      display: inline-block;
      background: #eee;
      border-radius: 12px;
      padding: 3px 8px;
      margin: 2px;
      font-size: 11px;
    }

    .radio {
      margin-top: 10px;
    }

    /* 🔥 TRIGRAM COLUMN */
    .trigram-block {
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 🔥 BIGGER TRIGRAMS */
    .trigram {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .top-trigram {
      margin-top: 10px;
      margin-bottom: 30px;
    }

    .bottom-trigram {
      margin-top: 40px;
    }

  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

  <!-- ORIGINAL -->
  <div class="hex-block">
    <div class="title">Original</div>
    <div id="orig-num" class="subtitle"></div>
    <div id="orig-eng" class="subtitle"></div>
    <div id="original"></div>
    <div id="orig-tags" class="tags"></div>
    <div class="radio">
      <input type="radio" name="hex-select">
    </div>
  </div>

  <!-- TRIGRAMS -->
  <div class="trigram-block">

    <div class="top-trigram">
      <div id="top-trigram" class="trigram"></div>
      <div id="top-tags" class="tags"></div>
    </div>

    <div class="bottom-trigram">
      <div id="bottom-trigram" class="trigram"></div>
      <div id="bottom-tags" class="tags"></div>
    </div>

  </div>

  <!-- NUCLEAR -->
  <div class="hex-block">
    <div class="title">Nuclear</div>
    <div id="nuc-num" class="subtitle"></div>
    <div id="nuc-eng" class="subtitle"></div>
    <div id="nuclear"></div>
    <div id="nuc-tags" class="tags"></div>
    <div class="radio">
      <input type="radio" name="hex-select">
    </div>
  </div>

  <!-- OUTCOME -->
  <div class="hex-block">
    <div class="title">Outcome</div>
    <div id="out-num" class="subtitle"></div>
    <div id="out-eng" class="subtitle"></div>
    <div id="outcome"></div>
    <div id="out-tags" class="tags"></div>
    <div class="radio">
      <input type="radio" name="hex-select">
    </div>
  </div>

</div>

<script>

let lines = [1,1,1,1,1,1];
let moving = [false,false,false,false,false,false];

let subjectLine = null;
let objectLine = null;

const SHEET_ID = "1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";

let hexagramData = [];

function getBinary(arr) {
  return arr.join("");
}

async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  hexagramData = rows.map(r => ({
    number: r.c[0].v,
    binary: String(r.c[1].v).padStart(6, "0"),
    pinyin: r.c[2].v,
    subject: Number(r.c[3].v),
    object: Number(r.c[4].v),
    english: r.c[5]?.v || "",
    chinese: r.c[6]?.v || "",
    meridians: r.c[7]?.v || "",
    topTrigram: r.c[8]?.v || "",
    bottomTrigram: r.c[9]?.v || "",
    topMeridians: r.c[10]?.v || "",
    bottomMeridians: r.c[11]?.v || ""
  }));

  update();
}

function findHexagram(arr) {
  return hexagramData.find(h => h.binary === getBinary(arr));
}

function getNuclear(arr) {
  return [arr[1],arr[2],arr[3],arr[2],arr[3],arr[4]];
}

function getOutcome(arr) {
  return arr.map((v,i) => moving[i] ? (v ? 0 : 1) : v);
}

function renderTags(id, text) {
  const c = document.getElementById(id);
  c.innerHTML = "";
  if (!text) return;

  text.split(",").forEach(t => {
    let tag = document.createElement("span");
    tag.className = "tag";
    tag.innerText = t.trim();
    c.appendChild(tag);
  });
}

function setLabels(id, hex) {
  if (!hex) return;

  document.getElementById(id+"-num").innerText =
    `${hex.number} ${hex.chinese} ${hex.pinyin}`;
  document.getElementById(id+"-eng").innerText = hex.english;

  renderTags(id+"-tags", hex.meridians);
}

function update() {
  const orig = findHexagram(lines);
  const nuclearArr = getNuclear(lines);
  const outcomeArr = getOutcome(lines);

  const nuclear = findHexagram(nuclearArr);
  const outcome = findHexagram(outcomeArr);

  if (orig) {
    subjectLine = orig.subject;
    objectLine = orig.object;

    document.getElementById("top-trigram").innerText = orig.topTrigram;
    document.getElementById("bottom-trigram").innerText = orig.bottomTrigram;

    renderTags("top-tags", orig.topMeridians);
    renderTags("bottom-tags", orig.bottomMeridians);
  }

  setLabels("orig", orig);
  setLabels("nuc", nuclear);
  setLabels("out", outcome);

  drawOriginal();
  drawSimple("nuclear", nuclearArr);
  drawSimple("outcome", outcomeArr);
}

function drawOriginal() {
  const c = document.getElementById("original");
  c.innerHTML = "";

  for (let i = 5; i >= 0; i--) {
    let row = document.createElement("div");
    row.className = "row";

    let left = document.createElement("div");
    left.className = "marker";

    let circle = document.createElement("div");
    circle.className = "circle";
    if (moving[i]) circle.innerText = lines[i] ? "O" : "X";

    left.appendChild(circle);
    left.onclick = () => { moving[i] = !moving[i]; update(); };

    let line = document.createElement("div");
    line.className = "line " + (lines[i] ? "yang" : "yin");
    line.onclick = () => { lines[i] = lines[i] ? 0 : 1; update(); };

    let right = document.createElement("div");
    right.className = "marker";
    if (i+1 === subjectLine) right.innerText = "S";
    if (i+1 === objectLine) right.innerText = "O";

    row.append(left, line, right);
    c.appendChild(row);
  }
}

function drawSimple(id, arr) {
  const c = document.getElementById(id);
  c.innerHTML = "";

  for (let i = 5; i >= 0; i--) {
    let row = document.createElement("div");
    row.className = "row";

    let left = document.createElement("div");
    left.className = "marker";

    let line = document.createElement("div");
    line.className = "line " + (arr[i] ? "yang" : "yin");

    let right = document.createElement("div");
    right.className = "marker";

    row.append(left, line, right);
    c.appendChild(row);
  }
}

function randomHexagram() {
  lines = Array.from({length:6}, () => Math.random() > 0.5 ? 1 : 0);
  moving = Array.from({length:6}, () => Math.random() > 0.5);
  update();
}

function resetAll() {
  lines = [1,1,1,1,1,1];
  moving = [false,false,false,false,false,false];
  update();
}

loadData();

</script>

</body>
</html>
