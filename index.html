<!DOCTYPE html>
<html>
<head>
  <title>I Ching Clinical Tool</title>

  <style>
    body { font-family: Arial; text-align:center; }

    .tag {
      display:inline-block;
      background:#eee;
      padding:4px 10px;
      margin:3px;
      border-radius:12px;
      cursor:pointer;
      font-size:11px;
    }

    .tag.active { background:black; color:white; }

    .section {
      width:800px;
      margin:30px auto;
      text-align:left;
    }

    .category {
      border-top:1px solid #ccc;
      padding:10px 0;
    }

    .category-header {
      cursor:pointer;
      font-weight:bold;
    }

    .formula {
      padding-left:15px;
      margin:4px 0;
      font-size:13px;
    }

    .hidden { display:none; }

  </style>
</head>

<body>

<h2>I Ching Clinical Tool</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<!-- FILTER -->
<div class="section">
  <h3>Meridian Filter</h3>
  <div id="filter-tags"></div>
</div>

<!-- FORMULAS -->
<div class="section">
  <h3>Formulas</h3>
  <div id="formula-list"></div>
</div>

<script>

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let selectedTags=new Set();

let hexData=[];
let formulaData=[];

const HEX_SHEET="1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";
const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

// ----------------
function getBinary(a){ return a.join(""); }

// ----------------
async function loadHex(){
  const url=`https://docs.google.com/spreadsheets/d/${HEX_SHEET}/gviz/tq?tqx=out:json`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substr(47).slice(0,-2));

  hexData=json.table.rows.map(r=>({
    binary:String(r.c[1].v).padStart(6,"0"),
    meridians:r.c[7]?.v||""
  }));

  update();
}

// ----------------
async function loadFormulas(){
  const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substr(47).slice(0,-2));

  formulaData=json.table.rows.map(r=>({
    name:r.c[0]?.v||"",
    category:r.c[3]?.v||"",
    meridians:r.c[4]?.v||""
  }));

  renderFormulas();
}

// ----------------
function findHex(a){
  return hexData.find(h=>h.binary===getBinary(a));
}

// ----------------
function buildFilter(){

  const orig=findHex(lines);
  if(!orig) return;

  selectedTags.clear();

  orig.meridians.split(",").forEach(m=>{
    selectedTags.add(m.trim());
  });

  renderFilter();
}

// ----------------
function renderFilter(){

  const c=document.getElementById("filter-tags");
  c.innerHTML="";

  selectedTags.forEach(t=>{
    let tag=document.createElement("span");
    tag.className="tag active";
    tag.innerText=t;

    tag.onclick=()=>{
      selectedTags.delete(t);
      update();
    };

    c.appendChild(tag);
  });
}

// ----------------
function update(){
  buildFilter();
  renderFilter();
  renderFormulas();
}

// ----------------
function renderFormulas(){

  const container=document.getElementById("formula-list");
  container.innerHTML="";

  // group by category
  let groups={};

  formulaData.forEach(f=>{
    if(!groups[f.category]) groups[f.category]=[];
    groups[f.category].push(f);
  });

  Object.keys(groups).forEach(cat=>{

    let list=groups[cat].filter(f=>{

      if(selectedTags.size===0) return true;

      return f.meridians.split(",").some(m=>
        selectedTags.has(m.trim())
      );
    });

    let wrapper=document.createElement("div");
    wrapper.className="category";

    let header=document.createElement("div");
    header.className="category-header";
    header.innerText=`${cat} (${list.length})`;

    let body=document.createElement("div");

    header.onclick=()=>{
      body.classList.toggle("hidden");
    };

    list.forEach(f=>{
      let row=document.createElement("div");
      row.className="formula";
      row.innerText=`${f.name} — ${f.meridians}`;
      body.appendChild(row);
    });

    wrapper.appendChild(header);
    wrapper.appendChild(body);
    container.appendChild(wrapper);
  });
}

// ----------------
function randomHexagram(){
  lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
  update();
}

function resetAll(){
  selectedTags.clear();
  update();
}

// ----------------
loadHex();
loadFormulas();

</script>

</body>
</html>
