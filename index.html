<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
  align-items:center;
}

.hex-block { width:220px; }

.row {
  display:flex;
  align-items:center;
  justify-content:center;
  margin:8px 0;
}

.marker { width:25px; text-align:center; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line {
  width:110px;
  height:12px;
  margin:0 6px;
  cursor:pointer;
}

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 8px;
  margin:2px;
  border-radius:10px;
  font-size:11px;
  cursor:pointer;
}

.tag.active { background:#333;color:white; }

.trigram-box {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:360px;
}

.trigram {
  font-size:28px;
  font-weight:bold;
}

.section {
  max-width:1000px;
  margin:20px auto;
  text-align:left;
}

.category-header {
  font-weight:bold;
  background:#eee;
  padding:6px;
  cursor:pointer;
}

.hidden { display:none; }

.formula-row {
  display:flex;
  padding:6px;
  cursor:pointer;
}

.formula-name { width:50%; }
.formula-tags { width:50%; }

.popup {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
  text-align:left;
}

.dropdown { display:inline-block; margin:4px; position:relative; }

.dropdown-content {
  display:none;
  position:absolute;
  background:white;
  border:1px solid #ccc;
  max-height:200px;
  overflow:auto;
  padding:8px;
  z-index:100;
}

.top-close {
  display:block;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetFilters()">Reset Filters</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" name="hex" checked onclick="selectHex('orig')">
</div>

<div class="trigram-box">
<div id="top-trigram" class="trigram"></div>
<div id="top-tags"></div>

<div style="height:40px;"></div>

<div id="bottom-trigram" class="trigram"></div>
<div id="bottom-tags"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio" name="hex" onclick="selectHex('nuc')">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio" name="hex" onclick="selectHex('out')">
</div>

</div>

<div class="section">
<h3 onclick="toggleInfo()">Hexagram Info ▼</h3>
<div id="hex-info"></div>
</div>

<div class="section">
<h3>Meridian Filter</h3>
<div id="meridian-filter"></div>

<h3>Symptom Filters</h3>
<div id="symptom-filters"></div>
</div>

<div class="section">
<h3>Formulas</h3>
<div id="formula-list"></div>
</div>

<div id="popup" class="popup hidden"></div>

<script>

/* KEEP ALL YOUR EXISTING JS EXACTLY THE SAME */

/* ===== ONLY CHANGE THIS FUNCTION ===== */

function showPopup(f){
let p=document.getElementById("popup");
p.innerHTML="";
p.classList.remove("hidden");

/* 🔥 CLOSE BUTTON AT TOP */
let close=document.createElement("button");
close.innerText="Close";
close.className="top-close";
close.onclick=()=>p.classList.add("hidden");
p.appendChild(close);

/* DATA */
f.raw.slice(0,17).forEach((c,i)=>{
if(c?.v){
let d=document.createElement("div");
d.innerHTML=`<b>${headers[i]}:</b> ${c.v}`;
p.appendChild(d);
}
});
}

/* ===== ENSURE TRIGRAMS RENDER ===== */

function update(){

let orig=findHex(getBinary(lines));
let nuc=findHex(getBinary(getNuclear()));
let out=findHex(getBinary(getOutcome()));

drawOriginal(orig);
drawStatic("nuclear",getNuclear());
drawStatic("outcome",getOutcome());

renderHex("orig",orig);
renderHex("nuc",nuc);
renderHex("out",out);

/* 🔥 TRIGRAM FIX */
if(orig){
document.getElementById("top-trigram").innerText=orig.top || "";
document.getElementById("bottom-trigram").innerText=orig.bottom || "";

renderTags("top-tags",orig.topEH);
renderTags("bottom-tags",orig.bottomEH);
}

/* keep rest same */
let m=[];
[orig,nuc,out].forEach(h=>{
if(h?.meridians){
m=m.concat(h.meridians.split(",").map(x=>x.trim()));
}
});
activeMeridians=[...new Set(m)];
renderMeridianFilter();

renderInfo();
renderFormulas();
}

</script>

</body>
</html>
