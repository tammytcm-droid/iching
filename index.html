<!DOCTYPE html>
<html>
<head>
  <title>I Ching TCM</title>

  <style>
    body { font-family: Arial; text-align: center; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      align-items: flex-start;
    }

    .hex-block { width: 200px; }

    .title { font-weight: bold; margin-bottom: 6px; }

    .name-block { min-height: 40px; margin-bottom: 6px; }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 24px;
      margin: 6px 0;
    }

    .marker { width: 30px; display:flex; justify-content:center; }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:10px;
    }

    .line { width:110px; height:12px; margin:0 6px; cursor:pointer; }

    .yang { background:black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    .tag {
      display:inline-block;
      background:#eee;
      padding:4px 10px;
      margin:2px;
      border-radius:12px;
      font-size:11px;
      cursor:pointer;
    }

    .tag.active {
      background:#333;
      color:white;
    }

    .notes { font-size:12px; margin-top:6px; }

    .info-section {
      margin-top:30px;
      border-top:1px solid #ccc;
      padding-top:15px;
      width:800px;
      margin-left:auto;
      margin-right:auto;
      text-align:left;
    }

    .formula-row {
      display: flex;
      padding: 6px;
      cursor: pointer;
    }

    .formula-name { width:50%; }

    .formula-tags { width:50%; display:flex; flex-wrap:wrap; }

    #filter-bar { margin-bottom:10px; }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      background: white;
      border: 1px solid #ccc;
      padding: 20px;
      width: 400px;
      max-height: 500px;
      overflow:auto;
      z-index: 999;
    }

    .hidden { display:none; }

  </style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

  <div class="hex-block">
    <div class="title">Original</div>
    <div id="orig-top"></div>
    <div id="orig-eng"></div>
    <div id="original"></div>
    <div id="orig-tags"></div>
    <div id="orig-notes" class="notes"></div>
  </div>

  <div class="hex-block">
    <div class="title">Nuclear</div>
    <div id="nuc-top"></div>
    <div id="nuc-eng"></div>
    <div id="nuclear"></div>
    <div id="nuc-tags"></div>
    <div id="nuc-notes" class="notes"></div>
  </div>

  <div class="hex-block">
    <div class="title">Outcome</div>
    <div id="out-top"></div>
    <div id="out-eng"></div>
    <div id="outcome"></div>
    <div id="out-tags"></div>
    <div id="out-notes" class="notes"></div>
  </div>

</div>

<div class="info-section">

  <h3>Formulas</h3>

  <div id="filter-bar"></div>
  <button onclick="resetFilter()">Reset Filter</button>

  <div id="formula-list"></div>

</div>

<div id="popup" class="popup hidden"></div>

<script>

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

const HEX_SHEET="1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";
const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

let hexData=[];
let formulaData=[];
let formulaHeaders=[];
let activeFilter=[];
let currentHex={};

function getBinary(a){ return a.join(""); }

async function loadHex(){
  const url=`https://docs.google.com/spreadsheets/d/${HEX_SHEET}/gviz/tq?tqx=out:json`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substr(47).slice(0,-2));

  hexData=json.table.rows.map(r=>({
    number:r.c[0].v,
    binary:String(r.c[1].v).padStart(6,"0"),
    pinyin:r.c[2].v,
    english:r.c[5]?.v||"",
    chinese:r.c[6]?.v||"",
    topM:r.c[10]?.v||"",
    notes:r.c[17]?.v||""
  }));

  update();
}

async function loadFormulas(){
  const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substring(47).slice(0,-2));

  const rows=json.table.rows;

  formulaHeaders=rows[0].c.map(c=>c?.v||"");

  formulaData=rows.slice(1).map(r=>({
    raw:r.c,
    name:r.c[0]?.v||"",
    category:r.c[3]?.v||"",
    meridians:r.c[4]?.v||""
  }));

  renderFormulas();
}

function buildFilter(){
  let all=[];

  ["orig","nuc","out"].forEach(type=>{
    const h=currentHex[type];
    if(h && h.topM){
      all=all.concat(h.topM.split(","));
    }
  });

  activeFilter=[...new Set(all.map(m=>m.trim()))];

  const bar=document.getElementById("filter-bar");
  bar.innerHTML="";

  activeFilter.forEach(m=>{
    let tag=document.createElement("span");
    tag.className="tag active";
    tag.innerText=m;

    tag.onclick=()=>{
      tag.classList.toggle("active");

      if(activeFilter.includes(m)){
        activeFilter=activeFilter.filter(x=>x!==m);
      } else {
        activeFilter.push(m);
      }

      renderFormulas();
    };

    bar.appendChild(tag);
  });
}

function resetFilter(){
  buildFilter();
  renderFormulas();
}

function renderFormulas(){
  const c=document.getElementById("formula-list");
  c.innerHTML="";

  formulaData.forEach(f=>{

    const match=f.meridians.split(",")
      .some(m=>activeFilter.includes(m.trim()));

    if(activeFilter.length && !match) return;

    const row=document.createElement("div");
    row.className="formula-row";

    const name=document.createElement("div");
    name.className="formula-name";
    name.innerText=f.name;

    const tags=document.createElement("div");
    tags.className="formula-tags";

    f.meridians.split(",").forEach(m=>{
      let tag=document.createElement("span");
      tag.className="tag";
      tag.innerText=m.trim();
      tags.appendChild(tag);
    });

    row.append(name,tags);
    row.onclick=()=>showPopup(f);

    c.appendChild(row);
  });
}

function showPopup(f){
  const popup=document.getElementById("popup");
  popup.innerHTML="";
  popup.style.textAlign="left";

  f.raw.slice(0,17).forEach((cell,i)=>{
    if(cell && cell.v){
      let row=document.createElement("div");
      row.innerHTML=`<b>${formulaHeaders[i]}:</b> ${cell.v}`;
      popup.appendChild(row);
    }
  });

  let close=document.createElement("button");
  close.innerText="Close";
  close.onclick=()=>popup.classList.add("hidden");

  popup.appendChild(close);
  popup.classList.remove("hidden");
}

function update(){
  currentHex={
    orig:hexData[Math.floor(Math.random()*hexData.length)],
    nuc:hexData[Math.floor(Math.random()*hexData.length)],
    out:hexData[Math.floor(Math.random()*hexData.length)]
  };

  ["orig","nuc","out"].forEach(type=>{
    const h=currentHex[type];
    document.getElementById(type+"-top").innerText=`${h.number} ${h.chinese} ${h.pinyin}`;
    document.getElementById(type+"-eng").innerText=h.english;
    document.getElementById(type+"-tags").innerHTML=h.topM;
    document.getElementById(type+"-notes").innerText=h.notes;
  });

  buildFilter();
}

function resetAll(){ update(); }
function randomHexagram(){ update(); }

loadHex();
loadFormulas();

</script>

</body>
</html>
