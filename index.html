<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    h2 { margin-top: 10px; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 20px;
    }

    .hex-block {
      text-align: center;
      width: 200px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 12px;
    }

    .subtitle {
      margin-bottom: 6px;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 22px;
      margin: 6px 0;
    }

    .marker {
      width: 25px;
      text-align: center;
      font-weight: bold;
      cursor: pointer;
    }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      margin: auto;
    }

    .line {
      width: 100px;
      height: 12px;
      margin: 0 6px;
      cursor: pointer;
    }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    /* 🏷 TAG STYLE */
    .tags {
      margin-top: 10px;
      min-height: 24px;
    }

    .tag {
      display: inline-block;
      background: #eee;
      border-radius: 12px;
      padding: 3px 8px;
      margin: 2px;
      font-size: 11px;
    }

    .radio {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

  <div class="hex-block">
    <div class="title">Original</div>
    <div id="orig-num" class="subtitle"></div>
    <div id="orig-eng" class="subtitle"></div>
    <div id="original"></div>
    <div id="orig-tags" class="tags"></div>
    <div class="radio">
      <input type="radio" name="hex-select" value="original">
    </div>
  </div>

  <div class="hex-block">
    <div class="title">Nuclear</div>
    <div id="nuc-num" class="subtitle"></div>
    <div id="nuc-eng" class="subtitle"></div>
    <div id="nuclear"></div>
    <div id="nuc-tags" class="tags"></div>
    <div class="radio">
      <input type="radio" name="hex-select" value="nuclear">
    </div>
  </div>

  <div class="hex-block">
    <div class="title">Outcome</div>
    <div id="out-num" class="subtitle"></div>
    <div id="out-eng" class="subtitle"></div>
    <div id="outcome"></div>
    <div id="out-tags" class="tags"></div>
    <div class="radio">
      <input type="radio" name="hex-select" value="outcome">
    </div>
  </div>

</div>

<script>

let lines = [1,1,1,1,1,1];
let moving = [false,false,false,false,false,false];

let subjectLine = null;
let objectLine = null;

const SHEET_ID = "1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";

let hexagramData = [];

// ----------------------------
function getBinary(arr) {
  return arr.join("");
}

// ----------------------------
async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  const res = await fetch(url);
  const text = await res.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  hexagramData = rows.map(r => ({
    number: r.c[0].v,
    binary: String(r.c[1].v).padStart(6, "0"),
    pinyin: r.c[2].v,
    subject: Number(r.c[3].v),
    object: Number(r.c[4].v),
    english: r.c[5]?.v || "",
    chinese: r.c[6]?.v || "",
    meridians: r.c[7]?.v || ""
  }));

  update();
}

// ----------------------------
function findHexagram(arr) {
  return hexagramData.find(h =>
    String(h.binary) === getBinary(arr)
  );
}

// ----------------------------
function getNuclear(arr) {
  return [arr[1],arr[2],arr[3],arr[2],arr[3],arr[4]];
}

// ----------------------------
function getOutcome(arr) {
  return arr.map((v,i) =>
    moving[i] ? (v ? 0 : 1) : v
  );
}

// ----------------------------
function setLabels(idPrefix, hex) {
  if (!hex) return;

  document.getElementById(idPrefix+"-num").innerText =
    `${hex.number} ${hex.chinese} ${hex.pinyin}`;

  document.getElementById(idPrefix+"-eng").innerText =
    hex.english;

  // 🏷 TAGS
  const tagContainer = document.getElementById(idPrefix+"-tags");
  tagContainer.innerHTML = "";

  if (hex.meridians) {
    hex.meridians.split(",").forEach(m => {
      let tag = document.createElement("span");
      tag.className = "tag";
      tag.innerText = m.trim();
      tagContainer.appendChild(tag);
    });
  }
}

// ----------------------------
function update() {

  const orig = findHexagram(lines);
  const nuclearArr = getNuclear(lines);
  const outcomeArr = getOutcome(lines);

  const nuclear = findHexagram(nuclearArr);
  const outcome = findHexagram(outcomeArr);

  if (orig) {
    subjectLine = orig.subject;
    objectLine = orig.object;
  }

  setLabels("orig", orig);
  setLabels("nuc", nuclear);
  setLabels("out", outcome);

  drawOriginal();
  drawSimple("nuclear", nuclearArr);
  drawSimple("outcome", outcomeArr);
}

// ----------------------------
function drawOriginal() {
  const container = document.getElementById("original");
  container.innerHTML = "";

  for (let i = 5; i >= 0; i--) {

    const val = lines[i];
    const lineNumber = i + 1;

    let row = document.createElement("div");
    row.className = "row";

    let left = document.createElement("div");
    left.className = "marker";

    let circle = document.createElement("div");
    circle.className = "circle";

    if (moving[i]) {
      circle.innerText = val ? "O" : "X";
    }

    left.appendChild(circle);

    left.onclick = () => {
      moving[i] = !moving[i];
      update();
    };

    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    line.onclick = () => {
      lines[i] = val ? 0 : 1;
      update();
    };

    let right = document.createElement("div");
    right.className = "marker";

    if (lineNumber === subjectLine) right.innerText = "S";
    if (lineNumber === objectLine) right.innerText = "O";

    row.appendChild(left);
    row.appendChild(line);
    row.appendChild(right);

    container.appendChild(row);
  }
}

// ----------------------------
function drawSimple(id, arr) {
  const container = document.getElementById(id);
  container.innerHTML = "";

  for (let i = 5; i >= 0; i--) {

    const val = arr[i];

    let row = document.createElement("div");
    row.className = "row";

    let left = document.createElement("div");
    left.className = "marker";

    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    let right = document.createElement("div");
    right.className = "marker";

    row.appendChild(left);
    row.appendChild(line);
    row.appendChild(right);

    container.appendChild(row);
  }
}

// ----------------------------
function randomHexagram() {
  lines = Array.from({length:6}, () => Math.random() > 0.5 ? 1 : 0);
  moving = Array.from({length:6}, () => Math.random() > 0.5);
  update();
}

// ----------------------------
function resetAll() {
  lines = [1,1,1,1,1,1];
  moving = [false,false,false,false,false,false];
  update();
}

// ----------------------------
loadData();

</script>

</body>
</html>
