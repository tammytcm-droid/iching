<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 6px;
    }

    .marker {
      width: 30px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .circle {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ccc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .line {
      width: 120px;
      height: 12px;
      margin: 0 10px;
      cursor: pointer;
    }

    .yang {
      background: black;
    }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }
  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<div id="hexagram"></div>

<script>

// 1 = yang, 0 = yin
let lines = [1,1,1,1,1,1];

// moving lines
let moving = [false,false,false,false,false,false];

// TEMP subject/object (we'll replace with real data later)
let subjectLine = 2;
let objectLine = 5;

function draw() {
  const container = document.getElementById("hexagram");
  container.innerHTML = "";

  lines.forEach((val, i) => {

    let row = document.createElement("div");
    row.className = "row";

    // LEFT circle (always visible)
    let left = document.createElement("div");
    left.className = "marker";

    let circle = document.createElement("div");
    circle.className = "circle";

    if (moving[i]) {
      circle.innerText = val ? "O" : "X";
    }

    left.appendChild(circle);

    left.onclick = () => {
      moving[i] = !moving[i];
      update();
    };

    // LINE
    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    line.onclick = () => {
      lines[i] = lines[i] ? 0 : 1;

      // IMPORTANT: reset moving marker if line changes
      moving[i] = false;

      update();
    };

    // RIGHT marker (subject/object)
    let right = document.createElement("div");
    right.className = "marker";

    if (i + 1 === subjectLine) right.innerText = "S";
    if (i + 1 === objectLine) right.innerText = "O";

    row.appendChild(left);
    row.appendChild(line);
    row.appendChild(right);

    container.appendChild(row);
  });
}

function update() {
  draw();

  // placeholder for next steps:
  // - detect hexagram
  // - calculate nuclear
  // - calculate outcome
}

draw();

</script>

</body>
</html>
