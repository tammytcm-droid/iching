<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body { font-family: Arial; text-align: center; }

    h2 { margin-top: 10px; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .section {
      margin-top: 20px;

    .title {

      font-weight: bold;

    }

      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;

    .line {
      width: 120px;

      margin: 0 10px;
      cursor: pointer;
    }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }
  </style>
</head>
