<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

.container {
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
  align-items:flex-start;
}

.hex-block { width:220px; }

.row {
  display:flex;
  align-items:center;
  justify-content:center;
  margin:6px 0;
}

.marker { width:25px; text-align:center; }

.circle {
  width:16px;height:16px;border-radius:50%;
  background:#ccc;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}

.line { width:110px;height:12px;margin:0 6px;cursor:pointer; }

.yang { background:black; }
.yin {
  background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
}

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}
.tag.active { background:#333;color:white; }

.filter-panel {
  display:none;
  border:1px solid #ccc;
  padding:8px;
  max-height:200px;
  overflow:auto;
  text-align:left;
  width:220px;
  margin:auto;
}

.section { max-width:1000px; margin:20px auto; text-align:left; }

.category-header { font-weight:bold; cursor:pointer; }

.hidden { display:none; }

.formula-row { display:flex; padding:6px; cursor:pointer; }
.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

</style>
</head>

<body>

<h2>I Ching TCM</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

<div class="hex-block">
<h3>Original</h3>
<div id="orig-title"></div>
<div id="original"></div>
<div id="orig-tags"></div>
<div id="orig-notes"></div>
<input type="radio" name="hex" checked onclick="selectHex('orig')">
</div>

<!-- 🔥 TRIGRAMS -->
<div>
<div id="top-trigram"></div>
<div id="top-tags"></div>
<div style="height:40px;"></div>
<div id="bottom-trigram"></div>
<div id="bottom-tags"></div>
</div>

<div class="hex-block">
<h3>Nuclear</h3>
<div id="nuc-title"></div>
<div id="nuclear"></div>
<div id="nuc-tags"></div>
<div id="nuc-notes"></div>
<input type="radio" name="hex" onclick="selectHex('nuc')">
</div>

<div class="hex-block">
<h3>Outcome</h3>
<div id="out-title"></div>
<div id="outcome"></div>
<div id="out-tags"></div>
<div id="out-notes"></div>
<input type="radio" name="hex" onclick="selectHex('out')">
</div>

</div>

<!-- INFO -->
<div class="section">
<h3 onclick="toggleInfo()" style="cursor:pointer;">Hexagram Information ▼</h3>
<div id="hex-info"></div>
</div>

<!-- FILTERS -->
<div class="section">
<h3>Meridian Filter</h3>
<div id="meridian-filter"></div>

<h3>Symptom Filters</h3>
<div id="symptom-buttons"></div>
<div id="symptom-panels"></div>
</div>

<!-- FORMULAS -->
<div class="section">
<h3>Formulas</h3>
<div id="formula-list"></div>
</div>

<script>

/* ================= STATE ================= */

let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let currentHex="orig";

let hexData=[];
let formulaData=[];

const HEX_SHEET="1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";
const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

const MERIDIANS=["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];
let activeMeridians=[...MERIDIANS];
let symptomFilters={};

/* ================= HEXAGRAM ================= */

function getBinary(arr){ return arr.join(""); }

function getOutcome(){
return lines.map((v,i)=> moving[i] ? (v?0:1) : v);
}

function getNuclear(){
return [lines[1],lines[2],lines[3],lines[2],lines[3],lines[4]];
}

function findHex(binary){
return hexData.find(h=>h.binary===binary);
}

/* ================= DRAW ================= */

function drawOriginal(hex){
const c=document.getElementById("original");
c.innerHTML="";

for(let i=5;i>=0;i--){
let row=document.createElement("div");
row.className="row";

let left=document.createElement("div");
left.className="marker";

let circle=document.createElement("div");
circle.className="circle";

if(moving[i]) circle.innerText=lines[i]?"O":"X";

circle.onclick=()=>{ moving[i]=!moving[i]; update(); };

left.appendChild(circle);

let line=document.createElement("div");
line.className="line "+(lines[i]?"yang":"yin");

line.onclick=()=>{ lines[i]=lines[i]?0:1; update(); };

let right=document.createElement("div");
right.className="marker";

if(hex){
if(i+1===hex.subject) right.innerText="S";
if(i+1===hex.object) right.innerText="O";
}

row.append(left,line,right);
c.appendChild(row);
}
}

function drawStatic(id,arr){
const c=document.getElementById(id);
c.innerHTML="";
for(let i=5;i>=0;i--){
let row=document.createElement("div");
row.className="row";
let line=document.createElement("div");
line.className="line "+(arr[i]?"yang":"yin");
row.appendChild(line);
c.appendChild(row);
}
}

/* ================= TAGS ================= */

function renderTags(id,str){
const c=document.getElementById(id);
c.innerHTML="";
if(!str) return;

str.split(",").forEach(t=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=t.trim();
c.appendChild(tag);
});
}

/* ================= UPDATE ================= */

function update(){

const orig=findHex(getBinary(lines));
const nuc=findHex(getBinary(getNuclear()));
const out=findHex(getBinary(getOutcome()));

drawOriginal(orig);
drawStatic("nuclear",getNuclear());
drawStatic("outcome",getOutcome());

renderHex("orig",orig);
renderHex("nuc",nuc);
renderHex("out",out);

/* 🔥 TRIGRAMS */
if(orig){
document.getElementById("top-trigram").innerText=orig.top;
document.getElementById("bottom-trigram").innerText=orig.bottom;

renderTags("top-tags",orig.topEH);
renderTags("bottom-tags",orig.bottomEH);
}

renderInfo();
renderFormulas();
}

/* ================= RENDER ================= */

function renderHex(prefix,hex){
if(!hex) return;

document.getElementById(prefix+"-title").innerText=
`${hex.number} ${hex.chinese} ${hex.name}\n${hex.english}`;

renderTags(prefix+"-tags",hex.meridians);
document.getElementById(prefix+"-notes").innerText=hex.notes;
}

function renderInfo(){
const hex=currentHex==="orig"
? findHex(getBinary(lines))
: currentHex==="nuc"
? findHex(getBinary(getNuclear()))
: findHex(getBinary(getOutcome()));

if(!hex) return;

document.getElementById("hex-info").innerText=
`${hex.infoS}\n${hex.infoT}\n${hex.infoU}\n${hex.infoV}\n${hex.infoW}`;
}

/* ================= FILTERS ================= */

function buildMeridianFilter(){
const c=document.getElementById("meridian-filter");
c.innerHTML="";

MERIDIANS.forEach(m=>{
let tag=document.createElement("span");
tag.className="tag active";
tag.innerText=m;

tag.onclick=()=>{
tag.classList.toggle("active");
if(activeMeridians.includes(m)){
activeMeridians=activeMeridians.filter(x=>x!==m);
}else{
activeMeridians.push(m);
}
renderFormulas();
};

c.appendChild(tag);
});
}

function parseSymptoms(val){
if(!val) return [];
return val.split(",").map(x=>x.trim());
}

function buildSymptomFilters(){

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

const btnC=document.getElementById("symptom-buttons");
const panelC=document.getElementById("symptom-panels");

btnC.innerHTML="";
panelC.innerHTML="";

names.forEach((name,i)=>{

symptomFilters[name]=[];

let btn=document.createElement("button");
btn.innerText=name;

let panel=document.createElement("div");
panel.className="filter-panel";

btn.onclick=()=> panel.style.display=panel.style.display==="block"?"none":"block";

let set=new Set();

formulaData.forEach(f=>{
parseSymptoms(f.raw[cols[i]]?.v).forEach(s=>set.add(s));
});

[...set].sort().forEach(s=>{

let label=document.createElement("label");

let cb=document.createElement("input");
cb.type="checkbox";

cb.onchange=()=>{
if(cb.checked){
symptomFilters[name].push(s);
}else{
symptomFilters[name]=symptomFilters[name].filter(x=>x!==s);
}
panel.style.display="none";
renderFormulas();
};

label.append(cb," "+s);
panel.appendChild(label);
panel.appendChild(document.createElement("br"));

});

btnC.appendChild(btn);
panelC.appendChild(panel);

});
}

/* ================= FORMULAS ================= */

function renderFormulas(){

const c=document.getElementById("formula-list");
c.innerHTML="";

const grouped={};

formulaData.forEach(f=>{

const mMatch=f.meridians.split(",")
.some(m=>activeMeridians.includes(m.trim()));

if(!mMatch) return;

const names=["Line 1","Line 2","Line 3","Line 4","Line 5","Line 6","General"];
const cols=[17,18,19,20,21,22,23];

for(let i=0;i<names.length;i++){
let selected=symptomFilters[names[i]];
if(selected.length){
let vals=parseSymptoms(f.raw[cols[i]]?.v);
if(!selected.some(v=>vals.includes(v))) return;
}
}

if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

Object.keys(grouped).forEach(cat=>{

let header=document.createElement("div");
header.className="category-header";
header.innerText=`${cat} (${grouped[cat].length})`;

let content=document.createElement("div");

header.onclick=()=>content.classList.toggle("hidden");

grouped[cat].forEach(f=>{

let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";

f.meridians.split(",").forEach(m=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=m.trim();
tags.appendChild(tag);
});

row.append(name,tags);
content.appendChild(row);
});

c.appendChild(header);
c.appendChild(content);

});
}

/* ================= UI ================= */

function selectHex(type){
currentHex=type;
renderInfo();
}

function toggleInfo(){
document.getElementById("hex-info").classList.toggle("hidden");
}

function resetAll(){
lines=[1,1,1,1,1,1];
moving=[false,false,false,false,false,false];
update();
}

function randomHexagram(){
lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
moving=Array.from({length:6},()=>Math.random()>0.5);
update();
}

/* ================= LOAD ================= */

async function loadAll(){

/* HEXAGRAMS */
let res=await fetch(`https://docs.google.com/spreadsheets/d/${HEX_SHEET}/gviz/tq?tqx=out:json`);
let text=await res.text();
let json=JSON.parse(text.substring(47).slice(0,-2));

hexData=json.table.rows.map(r=>({
number:r.c[0]?.v,
binary:String(r.c[1]?.v).padStart(6,"0"),
name:r.c[2]?.v,
subject:r.c[3]?.v,
object:r.c[4]?.v,
english:r.c[5]?.v,
chinese:r.c[6]?.v,
meridians:r.c[7]?.v,
top:r.c[8]?.v,
bottom:r.c[9]?.v,
topEH:r.c[10]?.v,
bottomEH:r.c[11]?.v,
notes:r.c[17]?.v,
infoS:r.c[18]?.v,
infoT:r.c[19]?.v,
infoU:r.c[20]?.v,
infoV:r.c[21]?.v,
infoW:r.c[22]?.v
}));

/* FORMULAS */
res=await fetch(`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`);
text=await res.text();
json=JSON.parse(text.substring(47).slice(0,-2));

formulaData=json.table.rows.slice(1).map(r=>({
raw:r.c,
name:r.c[0]?.v||"",
category:r.c[3]?.v||"",
meridians:r.c[4]?.v||""
}));

buildMeridianFilter();
buildSymptomFilters();
update();
}

loadAll();

</script>

</body>
</html>
