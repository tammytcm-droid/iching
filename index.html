<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body { font-family: Arial; text-align: center; }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 20px;
      align-items: flex-start;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 24px;
      margin: 6px 0;
    }

    .marker { width: 30px; display:flex; justify-content:center; }

    .line { width:110px; height:12px; margin:0 6px; }

    .yang { background:black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }

    .trigram { font-size:36px; font-weight:bold; }

    .tag {
      display:inline-block;
      background:#eee;
      border-radius:12px;
      padding:4px 10px;
      margin:3px;
      cursor:pointer;
      font-size:11px;
    }

    .tag.active { background:black; color:white; }

    .notes { font-size:12px; margin-top:6px; }

    .section {
      width:700px;
      margin:30px auto;
      text-align:left;
    }

    .formula {
      border-bottom:1px solid #ddd;
      padding:10px 0;
    }

  </style>
</head>

<body>

<h2>I Ching Clinical Tool</h2>

<button onclick="resetAll()">Reset</button>
<button onclick="randomHexagram()">Random</button>

<div class="container">

  <div>
    <div id="orig-num"></div>
    <div id="original"></div>
    <div id="orig-tags"></div>
    <div id="orig-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('orig')">
  </div>

  <div>
    <div id="top-trigram" class="trigram"></div>
    <div id="top-tags"></div>

    <div style="height:40px;"></div>

    <div id="bottom-trigram" class="trigram"></div>
    <div id="bottom-tags"></div>
  </div>

  <div>
    <div id="nuc-num"></div>
    <div id="nuclear"></div>
    <div id="nuc-tags"></div>
    <div id="nuc-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('nuc')">
  </div>

  <div>
    <div id="out-num"></div>
    <div id="outcome"></div>
    <div id="out-tags"></div>
    <div id="out-notes" class="notes"></div>
    <input type="radio" name="hex" onclick="selectHex('out')">
  </div>

</div>

<!-- INFO -->
<div class="section">
  <h3>Hexagram Info</h3>
  <div id="info"></div>
</div>

<!-- FORMULAS -->
<div class="section">
  <h3>Formulas</h3>
  <div id="formulas"></div>
</div>

<script>

// --------------------
// STATE
// --------------------
let lines=[1,1,1,1,1,1];
let moving=[false,false,false,false,false,false];

let selectedTags=new Set();

let hexData=[];
let formulaData=[];

// --------------------
// IDS
// --------------------
const HEX_SHEET="1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";
const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

// --------------------
function getBinary(a){ return a.join(""); }

// --------------------
async function loadHex(){
  const url=`https://docs.google.com/spreadsheets/d/${HEX_SHEET}/gviz/tq?tqx=out:json`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substr(47).slice(0,-2));

  hexData=json.table.rows.map(r=>({
    number:r.c[0].v,
    binary:String(r.c[1].v).padStart(6,"0"),
    pinyin:r.c[2].v,
    chinese:r.c[6]?.v||"",
    meridians:r.c[7]?.v||"",
    top:r.c[8]?.v||"",
    bottom:r.c[9]?.v||"",
    topM:r.c[10]?.v||"",
    bottomM:r.c[11]?.v||"",
    notes:r.c[17]?.v||"",
    info:[r.c[18]?.v,r.c[19]?.v,r.c[20]?.v]
  }));

  update();
}

// --------------------
async function loadFormulas(){
  const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json`;
  const res=await fetch(url);
  const text=await res.text();
  const json=JSON.parse(text.substr(47).slice(0,-2));

  formulaData=json.table.rows.map(r=>({
    name:r.c[0]?.v||"",
    meridians:r.c[1]?.v||"",
    notes:r.c[2]?.v||"",
    actions:r.c[3]?.v||"",
    indications:r.c[4]?.v||""
  }));

  renderFormulas();
}

// --------------------
function findHex(a){
  return hexData.find(h=>h.binary===getBinary(a));
}

// --------------------
function renderTags(id,text){
  const c=document.getElementById(id);
  c.innerHTML="";

  if(!text) return;

  text.split(",").forEach(t=>{
    let tag=document.createElement("span");
    tag.className="tag";
    tag.innerText=t.trim();

    if(selectedTags.has(t.trim())) tag.classList.add("active");

    tag.onclick=()=>{
      if(selectedTags.has(t.trim())) selectedTags.delete(t.trim());
      else selectedTags.add(t.trim());
      update();
    };

    c.appendChild(tag);
  });
}

// --------------------
function update(){

  const orig=findHex(lines);

  if(orig){
    document.getElementById("orig-num").innerText=
      `${orig.number} ${orig.chinese} ${orig.pinyin}`;

    document.getElementById("top-trigram").innerText=orig.top;
    document.getElementById("bottom-trigram").innerText=orig.bottom;

    renderTags("orig-tags",orig.meridians);
    renderTags("top-tags",orig.topM);
    renderTags("bottom-tags",orig.bottomM);

    document.getElementById("orig-notes").innerText=orig.notes;
  }

  drawHex("original",lines,true);

  renderFormulas();
}

// --------------------
function renderFormulas(){

  const container=document.getElementById("formulas");
  container.innerHTML="";

  let filtered=formulaData.filter(f=>{

    if(selectedTags.size===0) return true;

    return f.meridians.split(",").some(m=>
      selectedTags.has(m.trim())
    );
  });

  filtered.forEach(f=>{
    let div=document.createElement("div");
    div.className="formula";

    div.innerHTML=`
      <strong>${f.name}</strong><br>
      ${f.actions}<br>
      <em>${f.indications}</em>
    `;

    container.appendChild(div);
  });
}

// --------------------
function drawHex(id,arr,interactive=false){

  const c=document.getElementById(id);
  c.innerHTML="";

  for(let i=5;i>=0;i--){
    let row=document.createElement("div");
    row.className="row";

    let line=document.createElement("div");
    line.className="line "+(arr[i]?"yang":"yin");

    if(interactive){
      line.onclick=()=>{
        lines[i]=lines[i]?0:1;
        update();
      };
    }

    row.appendChild(document.createElement("div"));
    row.appendChild(line);
    row.appendChild(document.createElement("div"));

    c.appendChild(row);
  }
}

// --------------------
function randomHexagram(){
  lines=Array.from({length:6},()=>Math.random()>0.5?1:0);
  moving=Array.from({length:6},()=>Math.random()>0.5);
  update();
}

function resetAll(){
  lines=[1,1,1,1,1,1];
  moving=[false,false,false,false,false,false];
  selectedTags.clear();
  update();
}

// --------------------
loadHex();
loadFormulas();

</script>

</body>
</html>
