<!DOCTYPE html>
<html>
<head>
<title>I Ching TCM</title>

<style>
body { font-family: Arial; text-align:center; }

button { margin:10px; padding:6px 12px; cursor:pointer; }

.tag {
  display:inline-block;
  background:#eee;
  padding:4px 10px;
  margin:2px;
  border-radius:12px;
  font-size:11px;
  cursor:pointer;
}

.tag.active { background:#333;color:white; }

/* 🔥 FILTER LAYOUT */
#filter-bar { margin-bottom:10px; }

#line-filters {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
  width:1000px;
  margin:10px auto;
}

/* 🔥 CHECKBOX GROUP */
.checkbox-group {
  border:1px solid #ccc;
  padding:6px;
  text-align:left;
  max-height:150px;
  overflow:auto;
  font-size:12px;
}

.checkbox-group b {
  display:block;
  margin-bottom:4px;
}

/* FORMULAS */
.category-header {
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.hidden { display:none; }

.formula-row {
  display:flex;
  padding:6px;
  cursor:pointer;
}

.formula-name { width:50%; }
.formula-tags { width:50%; display:flex; flex-wrap:wrap; }

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  width:400px;
  max-height:500px;
  overflow:auto;
  border:1px solid #ccc;
  text-align:left;
}
</style>
</head>

<body>

<h2>I Ching TCM</h2>

<h3>Filters</h3>

<!-- MERIDIANS -->
<div id="filter-bar"></div>

<!-- 🔥 SYMPTOM FILTERS (NOW PROPERLY PLACED) -->
<div id="line-filters"></div>

<button onclick="resetFilter()">Reset Filter</button>

<h3>Formulas</h3>
<div id="formula-list"></div>

<div id="popup" class="popup hidden"></div>

<script>

const MERIDIANS=["LU","LI","ST","SP","HT","SI","UB","KD","PC","TW","GB","LV"];

let activeMeridians=[...MERIDIANS];
let lineFilters={};

let formulaData=[];
let formulaHeaders=[];

const FORMULA_SHEET="1aHGUMyg-524vwzfcEcs8JPFePnbj5Ss06QI7o7T8UqU";

/* ================= MERIDIAN FILTER ================= */

function buildMeridianFilter(){
const bar=document.getElementById("filter-bar");
bar.innerHTML="";

MERIDIANS.forEach(m=>{
let tag=document.createElement("span");
tag.className="tag active";
tag.innerText=m;

tag.onclick=()=>{
tag.classList.toggle("active");

if(activeMeridians.includes(m)){
activeMeridians=activeMeridians.filter(x=>x!==m);
}else{
activeMeridians.push(m);
}

renderFormulas();
};

bar.appendChild(tag);
});
}

/* ================= SYMPTOM FILTERS ================= */

function buildLineFilters(){

const container=document.getElementById("line-filters");
container.innerHTML="";

/* 🔥 ALL 7 FILTERS */
const columns = [
  {name:"Line 1", col:17},
  {name:"Line 2", col:18},
  {name:"Line 3", col:19},
  {name:"Line 4", col:20},
  {name:"Line 5", col:21},
  {name:"Line 6", col:22},
  {name:"General", col:23}
];

columns.forEach(c=>{

let values=new Set();

formulaData.forEach(f=>{
let v=f.raw[c.col]?.v;
if(v) values.add(v);
});

let box=document.createElement("div");
box.className="checkbox-group";

let title=document.createElement("b");
title.innerText=c.name;
box.appendChild(title);

lineFilters[c.name]=[];

values.forEach(v=>{

let label=document.createElement("label");

let cb=document.createElement("input");
cb.type="checkbox";
cb.value=v;

cb.onchange=()=>{
if(cb.checked){
lineFilters[c.name].push(v);
}else{
lineFilters[c.name]=lineFilters[c.name].filter(x=>x!==v);
}
renderFormulas();
};

label.appendChild(cb);
label.appendChild(document.createTextNode(" "+v));

box.appendChild(label);
box.appendChild(document.createElement("br"));
});

container.appendChild(box);

});
}

/* ================= FORMULA RENDER ================= */

function renderFormulas(){

const container=document.getElementById("formula-list");
container.innerHTML="";

const grouped={};

formulaData.forEach(f=>{

// MERIDIAN FILTER
const meridianMatch = f.meridians.split(",")
.some(m=>activeMeridians.includes(m.trim()));

if(!meridianMatch) return;

// SYMPTOM FILTERS
const columns = [
  {name:"Line 1", col:17},
  {name:"Line 2", col:18},
  {name:"Line 3", col:19},
  {name:"Line 4", col:20},
  {name:"Line 5", col:21},
  {name:"Line 6", col:22},
  {name:"General", col:23}
];

for(let c of columns){
let selected=lineFilters[c.name];
if(selected.length){
let val=f.raw[c.col]?.v;
if(!selected.includes(val)) return;
}
}

// GROUP
if(!grouped[f.category]) grouped[f.category]=[];
grouped[f.category].push(f);

});

// RENDER GROUPS
Object.keys(grouped).forEach(cat=>{

let list=grouped[cat];

let header=document.createElement("div");
header.className="category-header";
header.innerText=`${cat} (${list.length})`;

let content=document.createElement("div");

header.onclick=()=>content.classList.toggle("hidden");

list.forEach(f=>{

let row=document.createElement("div");
row.className="formula-row";

let name=document.createElement("div");
name.className="formula-name";
name.innerText=f.name;

let tags=document.createElement("div");
tags.className="formula-tags";

f.meridians.split(",").forEach(m=>{
let tag=document.createElement("span");
tag.className="tag";
tag.innerText=m.trim();
tags.appendChild(tag);
});

row.append(name,tags);
row.onclick=()=>showPopup(f);

content.appendChild(row);

});

container.appendChild(header);
container.appendChild(content);

});

}

/* ================= POPUP ================= */

function showPopup(f){

const popup=document.getElementById("popup");
popup.innerHTML="";
popup.classList.remove("hidden");

f.raw.slice(0,17).forEach((cell,i)=>{
if(cell && cell.v){
let row=document.createElement("div");
row.innerHTML=`<b>${formulaHeaders[i]}:</b> ${cell.v}`;
popup.appendChild(row);
}
});

let close=document.createElement("button");
close.innerText="Close";
close.onclick=()=>popup.classList.add("hidden");

popup.appendChild(close);
}

/* ================= RESET ================= */

function resetFilter(){
activeMeridians=[...MERIDIANS];
buildMeridianFilter();

Object.keys(lineFilters).forEach(k=>lineFilters[k]=[]);
buildLineFilters();

renderFormulas();
}

/* ================= LOAD ================= */

async function loadFormulas(){

const url=`https://docs.google.com/spreadsheets/d/${FORMULA_SHEET}/gviz/tq?tqx=out:json&gid=282292594`;
const res=await fetch(url);
const text=await res.text();
const json=JSON.parse(text.substring(47).slice(0,-2));

const rows=json.table.rows;

formulaHeaders=rows[0].c.map(c=>c?.v||"");

formulaData=rows.slice(1).map(r=>({
raw:r.c,
name:r.c[0]?.v||"",
category:r.c[3]?.v||"",
meridians:r.c[4]?.v||""
}));

buildMeridianFilter();
buildLineFilters();
renderFormulas();
}

loadFormulas();

</script>

</body>
</html>
