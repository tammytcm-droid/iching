<!DOCTYPE html>
<html>
<head>
  <title>I Ching App</title>

  <style>
    body { font-family: Arial; text-align: center; }

    h2 { margin-top: 10px; }

    button {
      margin: 10px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 8px;
    }

    .marker {
      width: 30px;
      text-align: center;
      cursor: pointer;
      font-weight: bold;
    }

    .circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin: auto;
    }

    .line {
      width: 120px;
      height: 14px;
      margin: 0 10px;
      cursor: pointer;
    }

    .yang { background: black; }

    .yin {
      background: linear-gradient(to right, black 40%, white 40%, white 60%, black 60%);
    }
  </style>
</head>

<body>

<h2>I Ching (Plum Blossom)</h2>

<button onclick="resetAll()">Reset</button>

<div id="hexagram"></div>

<script>

let lines = [1,1,1,1,1,1];
let moving = [false,false,false,false,false,false];

let subjectLine = null;
let objectLine = null;

const SHEET_ID = "1eYJ26LpAL3XV9l95-6r4nEvR3m_ksITatkMH4eKxlN4";

let hexagramData = [];

// ----------------------------
function getBinary() {
  return lines.join("");
}

// ----------------------------
async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  const res = await fetch(url);
  const text = await res.text();

  const json = JSON.parse(text.substr(47).slice(0, -2));
  const rows = json.table.rows;

  hexagramData = rows.map(r => ({
    number: r.c[0].v,
    binary: String(r.c[1].v).padStart(6, "0"),
    name: r.c[2].v,
    subject: Number(r.c[3].v),
    object: Number(r.c[4].v)
  }));

  update();
}

// ----------------------------
function findHexagram() {
  return hexagramData.find(h =>
    String(h.binary).padStart(6, "0") === getBinary()
  );
}

// ----------------------------
function update() {
  const hex = findHexagram();

  if (hex) {
    subjectLine = hex.subject;
    objectLine = hex.object;
  } else {
    subjectLine = null;
    objectLine = null;
  }

  draw();
}

// ----------------------------
// 🔥 FIX: REVERSE VISUAL ORDER
// ----------------------------
function draw() {
  const container = document.getElementById("hexagram");
  container.innerHTML = "";

  // IMPORTANT: reverse display order
  for (let i = 5; i >= 0; i--) {

    const val = lines[i];
    const lineNumber = i + 1; // still bottom-based logic

    let row = document.createElement("div");
    row.className = "row";

    // LEFT moving marker
    let left = document.createElement("div");
    left.className = "marker";

    let circle = document.createElement("div");
    circle.className = "circle";

    if (moving[i]) {
      circle.innerText = val === 1 ? "O" : "X";
    }

    left.appendChild(circle);

    left.onclick = () => {
      moving[i] = !moving[i];
      draw();
    };

    // LINE toggle
    let line = document.createElement("div");
    line.className = "line " + (val ? "yang" : "yin");

    line.onclick = () => {
      lines[i] = lines[i] ? 0 : 1;
      update();
    };

    // RIGHT subject/object
    let right = document.createElement("div");
    right.className = "marker";

    if (lineNumber === subjectLine) right.innerText = "S";
    if (lineNumber === objectLine) right.innerText = "O";

    row.appendChild(left);
    row.appendChild(line);
    row.appendChild(right);

    container.appendChild(row);
  }
}

// ----------------------------
function resetAll() {
  lines = [1,1,1,1,1,1];
  moving = [false,false,false,false,false,false];
  update();
}

// ----------------------------
draw();
loadData();

</script>

</body>
</html>
